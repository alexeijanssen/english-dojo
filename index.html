<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Walter's English Dojo</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a0f2e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Start Screen */
        .screen {
            display: none;
            flex-direction: column;
            flex: 1;
        }

        .screen.active {
            display: flex;
        }

        #startScreen {
            justify-content: center;
            align-items: center;
        }

        .dojo-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .dojo-title {
            font-family: 'Fredoka', sans-serif;
            font-size: 2.5em;
            font-weight: 700;
            background: linear-gradient(135deg, #6c5ce7 0%, #a29bfe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        .dojo-subtitle {
            font-size: 1.1em;
            color: #b0b0c0;
            margin-bottom: 30px;
        }

        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: rgba(108, 92, 231, 0.1);
            border: 1px solid rgba(108, 92, 231, 0.3);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            background: rgba(108, 92, 231, 0.2);
            border-color: rgba(108, 92, 231, 0.5);
            transform: translateY(-2px);
        }

        .stat-label {
            font-size: 0.9em;
            color: #9090a0;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 2em;
            font-weight: 700;
            color: #6c5ce7;
        }

        .streak-display {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 10px;
        }

        .streak-display .fire {
            font-size: 1.5em;
        }

        .mode-buttons {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
            justify-content: center;
        }

        .btn-mode {
            flex: 0 1 200px;
            padding: 30px 40px;
            font-size: 1.4em;
            font-weight: 600;
            border: 2px solid rgba(108, 92, 231, 0.5);
            background: rgba(108, 92, 231, 0.1);
            color: #e0e0e0;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Fredoka', sans-serif;
        }

        .btn-mode:hover {
            background: rgba(108, 92, 231, 0.2);
            border-color: #6c5ce7;
            transform: scale(1.05);
        }

        .btn-mode:active {
            transform: scale(0.98);
        }

        .readiness-meter {
            margin-bottom: 30px;
        }

        .readiness-label {
            font-size: 0.9em;
            color: #9090a0;
            margin-bottom: 10px;
            text-align: center;
        }

        .readiness-bar {
            width: 100%;
            height: 12px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .readiness-fill {
            height: 100%;
            background: linear-gradient(90deg, #6c5ce7 0%, #a29bfe 100%);
            width: 50%;
            transition: width 0.3s ease;
        }

        .mastered-counter {
            text-align: center;
            font-size: 0.95em;
            color: #b0b0c0;
        }

        /* Session Screen */
        .session-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .timer {
            font-family: 'Fredoka', sans-serif;
            font-size: 2.2em;
            font-weight: 700;
            color: #6c5ce7;
            text-align: center;
            min-width: 150px;
        }

        .progress-indicator {
            text-align: center;
            font-size: 0.9em;
            color: #9090a0;
        }

        .streak-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.1em;
            color: #ff6b6b;
            font-weight: 600;
        }

        .question-container {
            background: rgba(26, 26, 46, 0.8);
            border: 1px solid rgba(108, 92, 231, 0.2);
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 30px;
            min-height: 400px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .question-type {
            font-size: 0.85em;
            color: #6c5ce7;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .question-text {
            font-size: 1.3em;
            font-weight: 500;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .vocab-sentence {
            background: rgba(108, 92, 231, 0.15);
            padding: 20px;
            border-left: 4px solid #6c5ce7;
            border-radius: 8px;
            font-size: 1.1em;
            line-height: 1.8;
            margin-bottom: 20px;
            font-style: italic;
        }

        .vocab-word {
            font-weight: 700;
            color: #a29bfe;
        }

        .spelling-sentence {
            background: rgba(108, 92, 231, 0.15);
            padding: 20px;
            border-radius: 8px;
            font-size: 1.1em;
            line-height: 1.8;
            margin-bottom: 20px;
        }

        .spelling-section {
            display: inline;
            padding: 0 4px;
            margin: 0 2px;
            border-radius: 4px;
            transition: all 0.2s ease;
        }

        .passage {
            background: rgba(108, 92, 231, 0.15);
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 25px;
            line-height: 1.8;
            font-size: 1em;
            color: #d0d0e0;
        }

        .options {
            display: grid;
            gap: 15px;
        }

        .option {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(108, 92, 231, 0.3);
            border-radius: 12px;
            padding: 18px 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: left;
            font-size: 1em;
        }

        .option:hover {
            background: rgba(108, 92, 231, 0.2);
            border-color: #6c5ce7;
            transform: translateX(8px);
        }

        .option.selected {
            background: rgba(108, 92, 231, 0.3);
            border-color: #6c5ce7;
        }

        .option-label {
            font-weight: 600;
            color: #6c5ce7;
            margin-right: 10px;
        }

        .feedback {
            margin-top: 20px;
            padding: 20px;
            border-radius: 12px;
            font-weight: 500;
            line-height: 1.6;
            display: none;
        }

        .feedback.correct {
            display: block;
            background: rgba(51, 217, 178, 0.15);
            border: 2px solid rgba(51, 217, 178, 0.5);
            color: #33d9b2;
        }

        .feedback.incorrect {
            display: block;
            background: rgba(255, 107, 107, 0.15);
            border: 2px solid rgba(255, 107, 107, 0.5);
            color: #ff6b6b;
        }

        .feedback-label {
            font-weight: 700;
            margin-bottom: 8px;
        }

        .btn-next {
            margin-top: 30px;
            padding: 15px 40px;
            font-size: 1.1em;
            font-weight: 600;
            background: linear-gradient(135deg, #6c5ce7 0%, #a29bfe 100%);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            align-self: center;
            display: none;
        }

        .btn-next.show {
            display: block;
        }

        .btn-next:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(108, 92, 231, 0.3);
        }

        .btn-next:active {
            transform: scale(0.98);
        }

        .points-popup {
            position: fixed;
            pointer-events: none;
            font-weight: 700;
            font-size: 1.5em;
            animation: popupFloat 2s ease-out forwards;
        }

        .points-popup.bonus {
            color: #ffd700;
        }

        .points-popup.normal {
            color: #6c5ce7;
        }

        @keyframes popupFloat {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-60px) scale(1.2);
            }
        }

        .confetti {
            position: fixed;
            pointer-events: none;
            animation: confettiFall 3s ease-out forwards;
        }

        @keyframes confettiFall {
            0% {
                opacity: 1;
                transform: translateY(0) rotateZ(0);
            }
            100% {
                opacity: 0;
                transform: translateY(600px) rotateZ(360deg);
            }
        }

        /* Complete Screen */
        #completeScreen {
            justify-content: center;
            align-items: center;
        }

        .complete-container {
            text-align: center;
            max-width: 600px;
        }

        .complete-title {
            font-family: 'Fredoka', sans-serif;
            font-size: 2.5em;
            font-weight: 700;
            color: #33d9b2;
            margin-bottom: 20px;
        }

        .complete-emoji {
            font-size: 3em;
            margin-bottom: 20px;
            animation: bounce 0.6s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        .summary-item {
            background: rgba(108, 92, 231, 0.1);
            border: 1px solid rgba(108, 92, 231, 0.3);
            border-radius: 12px;
            padding: 20px;
        }

        .summary-label {
            font-size: 0.9em;
            color: #9090a0;
            margin-bottom: 8px;
        }

        .summary-value {
            font-size: 1.8em;
            font-weight: 700;
            color: #6c5ce7;
        }

        .encouragement {
            font-size: 1.2em;
            color: #b0b0c0;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .btn-restart {
            padding: 15px 40px;
            font-size: 1.1em;
            font-weight: 600;
            background: linear-gradient(135deg, #6c5ce7 0%, #a29bfe 100%);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-restart:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(108, 92, 231, 0.3);
        }

        @media (max-width: 768px) {
            .dojo-title {
                font-size: 2em;
            }

            .mode-buttons {
                flex-direction: column;
            }

            .btn-mode {
                width: 100%;
            }

            .question-container {
                padding: 25px;
                min-height: auto;
            }

            .summary-grid {
                grid-template-columns: 1fr;
            }

            .session-header {
                flex-direction: column;
                align-items: center;
            }

            .timer {
                font-size: 2em;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 15px;
            }

            .dojo-title {
                font-size: 1.6em;
            }

            .dojo-subtitle {
                font-size: 0.95em;
            }

            .stats-container {
                grid-template-columns: repeat(2, 1fr);
            }

            .question-text {
                font-size: 1.1em;
            }

            .options {
                gap: 10px;
            }

            .option {
                padding: 15px;
                font-size: 0.95em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Start Screen -->
        <div id="startScreen" class="screen active">
            <div class="dojo-header">
                <div class="dojo-title">Walter's English Dojo</div>
                <div class="dojo-subtitle">Level up your 11+ English skills</div>
            </div>

            <div class="stats-container" id="statsContainer">
                <div class="stat-card">
                    <div class="stat-label">Total Points</div>
                    <div class="stat-value" id="totalPointsDisplay">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Accuracy</div>
                    <div class="stat-value" id="accuracyDisplay">—</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Best Streak</div>
                    <div class="stat-value" id="bestStreakDisplay">0</div>
                    <div class="streak-display" id="streakFireDisplay"></div>
                </div>
            </div>

            <div class="readiness-meter">
                <div class="readiness-label">Overall Readiness</div>
                <div class="readiness-bar">
                    <div class="readiness-fill" id="readinessFill"></div>
                </div>
                <div class="mastered-counter" id="masteredCounter">0 items mastered</div>
            </div>

            <div class="mode-buttons">
                <button class="btn-mode" data-duration="900">15 min</button>
                <button class="btn-mode" data-duration="1800">30 min</button>
            </div>
        </div>

        <!-- Session Screen -->
        <div id="sessionScreen" class="screen">
            <div class="session-header">
                <div class="timer" id="timer">15:00</div>
                <div class="progress-indicator" id="progressIndicator">0/0</div>
                <div class="streak-indicator" id="streakIndicator">
                    <span id="currentStreakNumber">0</span> <span id="streakIcon"></span>
                </div>
            </div>

            <div class="question-container" id="questionContainer">
                <!-- Dynamically populated -->
            </div>

            <button class="btn-next" id="nextBtn">Next</button>
        </div>

        <!-- Complete Screen -->
        <div id="completeScreen" class="screen">
            <div class="complete-container">
                <div class="complete-emoji">🎉</div>
                <div class="complete-title">Session Complete!</div>

                <div class="summary-grid">
                    <div class="summary-item">
                        <div class="summary-label">Questions</div>
                        <div class="summary-value" id="completeQuestionsCount">0</div>
                    </div>
                    <div class="summary-item">
                        <div class="summary-label">Accuracy</div>
                        <div class="summary-value" id="completeAccuracy">0%</div>
                    </div>
                    <div class="summary-item">
                        <div class="summary-label">Points</div>
                        <div class="summary-value" id="completePoints">0</div>
                    </div>
                    <div class="summary-item">
                        <div class="summary-label">Streak</div>
                        <div class="summary-value" id="completeStreak">0</div>
                    </div>
                </div>

                <div class="encouragement" id="encouragement"></div>

                <button class="btn-restart">Back to Home</button>
            </div>
        </div>
    </div>

    <script>
        // ===== STATE MANAGEMENT =====
        const STATE_KEY = 'walterDojo';
        const ITEMS_KEY = 'walterDojoItems';

        class AdaptiveEngine {
            constructor() {
                this.items = this.loadItems();
                this.globalStats = this.loadGlobalStats();
                this.currentSession = null;
            }

            loadItems() {
                const saved = localStorage.getItem(ITEMS_KEY);
                if (saved) {
                    try {
                        return JSON.parse(saved);
                    } catch (e) {
                        console.error('Failed to load items:', e);
                        return this.initializeItems();
                    }
                }
                return this.initializeItems();
            }

            initializeItems() {
                const items = {};
                const allQuestions = [
                    ...VOCAB_QUESTIONS,
                    ...SPELLING_QUESTIONS,
                    ...PUNCTUATION_QUESTIONS,
                    ...COMPREHENSION_QUESTIONS
                ];

                allQuestions.forEach((q, idx) => {
                    const id = `${q.type}-${idx}`;
                    items[id] = {
                        id,
                        type: q.type,
                        recall: null,
                        stability: 0.5,
                        difficulty: 0.5,
                        lastReview: null,
                        lapseCount: 0,
                        encounters: 0,
                        correctCount: 0,
                        avgLatency: 0,
                        tags: [q.type]
                    };
                });

                return items;
            }

            loadGlobalStats() {
                const saved = localStorage.getItem(STATE_KEY);
                if (saved) {
                    try {
                        return JSON.parse(saved);
                    } catch (e) {
                        console.error('Failed to load stats:', e);
                        return this.getDefaultStats();
                    }
                }
                return this.getDefaultStats();
            }

            getDefaultStats() {
                return {
                    totalPoints: 0,
                    bestStreak: 0,
                    currentStreak: 0,
                    totalSessions: 0,
                    sessionHistory: [],
                    firstUseTimestamp: Date.now()
                };
            }

            saveItems() {
                localStorage.setItem(ITEMS_KEY, JSON.stringify(this.items));
            }

            saveGlobalStats() {
                localStorage.setItem(STATE_KEY, JSON.stringify(this.globalStats));
            }

            calculateRecall(item) {
                if (item.recall === null || item.lastReview === null) {
                    return 0;
                }
                const now = Date.now();
                const timeSinceReview = (now - item.lastReview) / (1000 * 60 * 60 * 24);
                const t = timeSinceReview;
                const S = item.stability;
                const recall = Math.exp(-t / S);
                return Math.max(0, Math.min(1, recall));
            }

            recalculateAllRecalls() {
                Object.keys(this.items).forEach(id => {
                    const item = this.items[id];
                    if (item.lastReview !== null) {
                        item.recall = this.calculateRecall(item);
                    }
                });
            }

            getAverageRecall() {
                const reviewedItems = Object.values(this.items).filter(item => item.recall !== null);
                if (reviewedItems.length === 0) return 0;
                const avg = reviewedItems.reduce((sum, item) => sum + item.recall, 0) / reviewedItems.length;
                return avg;
            }

            getMasteredCount() {
                return Object.values(this.items).filter(item => {
                    return item.recall !== null && item.recall > 0.85 && item.stability > 7;
                }).length;
            }

            getOverallAccuracy() {
                const reviewedItems = Object.values(this.items).filter(item => item.encounters > 0);
                if (reviewedItems.length === 0) return null;
                const totalEncounters = reviewedItems.reduce((sum, item) => sum + item.encounters, 0);
                const totalCorrect = reviewedItems.reduce((sum, item) => sum + item.correctCount, 0);
                if (totalEncounters === 0) return null;
                return Math.round((totalCorrect / totalEncounters) * 100);
            }

            buildSessionQueue(targetQuestions, maxNewItems = 4) {
                this.recalculateAllRecalls();

                const lapsed = [];
                const due = [];
                const newItems = [];

                Object.entries(this.items).forEach(([id, item]) => {
                    if (item.lapseCount > 0 && item.recall < 0.3) {
                        lapsed.push([id, item, item.recall]);
                    } else if (item.recall !== null && item.recall < 0.7) {
                        due.push([id, item, item.recall]);
                    } else if (item.encounters === 0) {
                        newItems.push([id, item]);
                    }
                });

                due.sort((a, b) => a[2] - b[2]);

                const queue = [];

                lapsed.forEach(([id, item]) => {
                    if (queue.length < targetQuestions) {
                        queue.push(id);
                    }
                });

                due.forEach(([id, item]) => {
                    if (queue.length < targetQuestions) {
                        queue.push(id);
                    }
                });

                let usedNewItems = 0;
                newItems.forEach(([id, item]) => {
                    if (queue.length < targetQuestions && usedNewItems < maxNewItems) {
                        queue.push(id);
                        usedNewItems++;
                    }
                });

                return this.deduplicateTypes(queue);
            }

            deduplicateTypes(queue) {
                const result = [];
                const lastThree = [];

                queue.forEach(id => {
                    const itemType = this.items[id].type;
                    let sameTypeCount = 0;

                    lastThree.forEach(lastId => {
                        if (this.items[lastId].type === itemType) {
                            sameTypeCount++;
                        }
                    });

                    if (sameTypeCount < 2) {
                        result.push(id);
                        lastThree.push(id);
                        if (lastThree.length > 3) lastThree.shift();
                    }
                });

                return result;
            }

            recordAnswer(itemId, isCorrect, latency) {
                const item = this.items[itemId];
                if (!item) return;

                item.encounters += 1;
                if (isCorrect) {
                    item.correctCount += 1;
                }

                if (item.avgLatency === 0) {
                    item.avgLatency = latency;
                } else {
                    item.avgLatency = item.avgLatency * 0.7 + latency * 0.3;
                }

                const thresholds = {
                    vocab: { fluent: 8000, slow: 15000 },
                    spelling: { fluent: 10000, slow: 20000 },
                    punctuation: { fluent: 12000, slow: 25000 },
                    comprehension: { fluent: 20000, slow: 40000 }
                };

                const threshold = thresholds[item.type] || { fluent: 10000, slow: 20000 };
                const isFast = latency < threshold.fluent;

                if (item.lastReview === null) {
                    item.recall = isCorrect ? 0.8 : 0.2;
                    item.stability = 0.5;
                    item.lastReview = Date.now();
                } else {
                    if (isCorrect) {
                        if (isFast) {
                            item.stability *= 1 + 0.5 * (1 - item.difficulty);
                            item.difficulty = Math.max(0.05, item.difficulty - 0.05);
                        } else {
                            item.stability *= 1.2;
                        }
                        item.recall = 0.85;
                    } else {
                        item.stability *= 0.5;
                        item.stability = Math.max(0.2, item.stability);
                        item.difficulty = Math.min(0.95, item.difficulty + 0.1);
                        item.lapseCount += 1;
                        item.recall = 0.2;
                    }
                    item.lastReview = Date.now();
                }

                this.saveItems();
            }
        }

        // ===== QUESTION BANKS =====
        const VOCAB_QUESTIONS = [
            { type: 'vocab', word: 'fixedly', sentence: 'Scrooge looked fixedly at the strange face', options: ['Briefly', 'Continuously', 'Disgustedly', 'Astonishedly'], correct: 1, explanation: "'Fixedly' means to stare continuously without looking away." },
            { type: 'vocab', word: 'resounded', sentence: 'The sound resounded through the house like thunder', options: ['Loud repeating sound', 'Mumbling sound', 'Low pitch sound', 'Sudden sound'], correct: 0, explanation: "'Resounded' means a sound that echoes and repeats loudly." },
            { type: 'vocab', word: 'obliged', sentence: 'Scrooge felt obliged to keep his promise', options: ['Reluctant', 'Positioned', 'Compelled', 'Burdened'], correct: 2, explanation: "'Obliged' means forced or compelled to do something." },
            { type: 'vocab', word: 'melancholy', sentence: 'Scrooge ate his melancholy dinner alone', options: ['Spirited', 'Lovely', 'Tasty', 'Joyless'], correct: 3, explanation: "'Melancholy' means deeply sad and joyless." },

        // ===== UI CONTROLLER =====
        class UIController {
            constructor(engine) {
                this.engine = engine;
                this.currentScreen = 'start';
                this.sessionDuration = null;
                this.sessionQueue = [];
                this.sessionCurrentIndex = 0;
                this.sessionStartTime = null;
                this.sessionStats = null;
                this.timerInterval = null;
                this.questionStartTime = null;

                this.setupEventListeners();
                this.render();
            }

            setupEventListeners() {
                document.querySelectorAll('.btn-mode').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        this.startSession(parseInt(e.target.dataset.duration));
                    });
                });

                document.getElementById('nextBtn').addEventListener('click', () => {
                    this.handleNextQuestion();
                });

                const restartBtn = document.querySelector('.btn-restart');
                if (restartBtn) {
                    restartBtn.addEventListener('click', () => {
                        this.goToStart();
                    });
                }
            }

            render() {
                this.updateStartScreen();
            }

            updateStartScreen() {
                document.getElementById('totalPointsDisplay').textContent = this.engine.globalStats.totalPoints;
                const accuracy = this.engine.getOverallAccuracy();
                document.getElementById('accuracyDisplay').textContent = accuracy !== null ? accuracy + '%' : '—';

                const bestStreak = this.engine.globalStats.bestStreak;
                document.getElementById('bestStreakDisplay').textContent = bestStreak;

                const streakFireDisplay = document.getElementById('streakFireDisplay');
                streakFireDisplay.innerHTML = '';
                if (bestStreak >= 2) {
                    streakFireDisplay.innerHTML = '<span class="fire">🔥</span><span>' + bestStreak + '</span>';
                }

                const avgRecall = this.engine.getAverageRecall();
                document.getElementById('readinessFill').style.width = (avgRecall * 100) + '%';

                const mastered = this.engine.getMasteredCount();
                document.getElementById('masteredCounter').textContent = mastered + ' items mastered';
            }

            startSession(duration) {
                this.sessionDuration = duration;
                this.sessionStartTime = Date.now();

                const targetQuestions = duration === 900 ? 20 : 40;

                this.sessionQueue = this.engine.buildSessionQueue(targetQuestions, 4);

                this.sessionStats = {
                    questionsAnswered: 0,
                    correctAnswers: 0,
                    pointsEarned: 0,
                    currentStreak: 0,
                    startTime: Date.now()
                };

                this.sessionCurrentIndex = 0;
                this.showScreen('session');
                this.startTimer();
                this.displayNextQuestion();
            }

            startTimer() {
                let timeRemaining = this.sessionDuration;

                this.timerInterval = setInterval(() => {
                    timeRemaining -= 1;

                    const minutes = Math.floor(timeRemaining / 60);
                    const seconds = timeRemaining % 60;
                    const display = String(minutes).padStart(2, '0') + ':' + String(seconds).padStart(2, '0');

                    document.getElementById('timer').textContent = display;

                    if (timeRemaining <= 0) {
                        clearInterval(this.timerInterval);
                        this.finishSession();
                    }
                }, 1000);
            }

            displayNextQuestion() {
                if (this.sessionCurrentIndex >= this.sessionQueue.length) {
                    this.finishSession();
                    return;
                }

                const itemId = this.sessionQueue[this.sessionCurrentIndex];
                const item = this.engine.items[itemId];
                const question = this.getQuestionData(item);

                document.getElementById('progressIndicator').textContent =
                    (this.sessionCurrentIndex + 1) + '/' + Math.min(this.sessionQueue.length, 50);

                const streakNumber = this.sessionStats.currentStreak;
                document.getElementById('currentStreakNumber').textContent = streakNumber;
                document.getElementById('streakIcon').textContent = streakNumber > 0 ? '🔥' : '';

                document.getElementById('nextBtn').classList.remove('show');
                const feedback = document.querySelector('.feedback');
                if (feedback) {
                    feedback.remove();
                }

                this.renderQuestion(item, question);

                this.questionStartTime = Date.now();
            }

            getQuestionData(item) {
                const allQuestions = [
                    ...VOCAB_QUESTIONS,
                    ...SPELLING_QUESTIONS,
                    ...PUNCTUATION_QUESTIONS,
                    ...COMPREHENSION_QUESTIONS
                ];

                let typeIndex = 0;
                for (let i = 0; i < allQuestions.length; i++) {
                    if (allQuestions[i].type === item.type) {
                        if (typeIndex === this.getTypeIndexForItem(item)) {
                            return allQuestions[i];
                        }
                        typeIndex++;
                    }
                }

                return allQuestions[0];
            }

            getTypeIndexForItem(item) {
                let index = 0;
                const allQuestions = [
                    ...VOCAB_QUESTIONS,
                    ...SPELLING_QUESTIONS,
                    ...PUNCTUATION_QUESTIONS,
                    ...COMPREHENSION_QUESTIONS
                ];

                for (let q of allQuestions) {
                    if (q.type === item.type) {
                        if (item.id === item.type + '-' + index) {
                            return index;
                        }
                        index++;
                    }
                }

                return 0;
            }

            renderQuestion(item, question) {
                const container = document.getElementById('questionContainer');
                container.innerHTML = '';

                const typeLabel = document.createElement('div');
                typeLabel.className = 'question-type';
                typeLabel.textContent = item.type.toUpperCase();
                container.appendChild(typeLabel);

                if (item.type === 'vocab') {
                    this.renderVocabQuestion(container, question);
                } else if (item.type === 'spelling') {
                    this.renderSpellingQuestion(container, question);
                } else if (item.type === 'punctuation') {
                    this.renderPunctuationQuestion(container, question);
                } else if (item.type === 'comprehension') {
                    this.renderComprehensionQuestion(container, question);
                }
            }

            renderVocabQuestion(container, question) {
                const sentence = document.createElement('div');
                sentence.className = 'vocab-sentence';
                const parts = question.sentence.split(question.word);
                sentence.appendChild(document.createTextNode(parts[0]));
                const word = document.createElement('span');
                word.className = 'vocab-word';
                word.textContent = question.word;
                sentence.appendChild(word);
                sentence.appendChild(document.createTextNode(parts[1]));
                container.appendChild(sentence);

                const questionText = document.createElement('div');
                questionText.className = 'question-text';
                questionText.textContent = 'What does ' + question.word + ' mean?';
                container.appendChild(questionText);

                const options = document.createElement('div');
                options.className = 'options';

                question.options.forEach((option, idx) => {
                    const opt = document.createElement('div');
                    opt.className = 'option';
                    opt.innerHTML = '<span class="option-label">' + String.fromCharCode(65 + idx) + '.</span>' + option;
                    opt.addEventListener('click', () => this.handleAnswer(idx, question.correct, question.explanation));
                    options.appendChild(opt);
                });

                container.appendChild(options);
            }

            renderSpellingQuestion(container, question) {
                const sentence = document.createElement('div');
                sentence.className = 'spelling-sentence';

                question.sections.forEach((section, idx) => {
                    const span = document.createElement('span');
                    span.className = 'spelling-section';
                    if (idx === 0) span.style.backgroundColor = 'rgba(108, 92, 231, 0.2)';
                    if (idx === 1) span.style.backgroundColor = 'rgba(162, 155, 254, 0.2)';
                    if (idx === 2) span.style.backgroundColor = 'rgba(108, 92, 231, 0.15)';
                    span.textContent = section;
                    sentence.appendChild(span);
                    sentence.appendChild(document.createTextNode(' '));
                });

                container.appendChild(sentence);

                const questionText = document.createElement('div');
                questionText.className = 'question-text';
                questionText.textContent = 'Which section (if any) has a spelling error?';
                container.appendChild(questionText);

                const options = document.createElement('div');
                options.className = 'options';

                const labels = ['A', 'B', 'C', 'No error'];
                [0, 1, 2, -1].forEach((idx, i) => {
                    const opt = document.createElement('div');
                    opt.className = 'option';
                    opt.innerHTML = '<span class="option-label">' + labels[i] + '.</span>' + (idx === -1 ? 'No error' : 'Section ' + labels[i]);
                    opt.addEventListener('click', () => this.handleAnswer(idx, question.correct, question.explanation));
                    options.appendChild(opt);
                });

                container.appendChild(options);
            }

            renderPunctuationQuestion(container, question) {
                const questionText = document.createElement('div');
                questionText.className = 'question-text';
                questionText.textContent = 'Which option is correctly punctuated?';
                container.appendChild(questionText);

                const currentSentence = document.createElement('div');
                currentSentence.style.cssText = 'background: rgba(108, 92, 231, 0.15); padding: 15px; border-radius: 8px; margin-bottom: 20px; font-style: italic; color: #d0d0e0;';
                currentSentence.textContent = question.sentence;
                container.appendChild(currentSentence);

                const options = document.createElement('div');
                options.className = 'options';

                question.options.forEach((option, idx) => {
                    const opt = document.createElement('div');
                    opt.className = 'option';
                    opt.innerHTML = '<span class="option-label">' + String.fromCharCode(65 + idx) + '.</span>' + option;
                    opt.addEventListener('click', () => this.handleAnswer(idx, question.correct, question.explanation));
                    options.appendChild(opt);
                });

                container.appendChild(options);
            }

            renderComprehensionQuestion(container, question) {
                const passage = document.createElement('div');
                passage.className = 'passage';
                passage.textContent = question.passage;
                container.appendChild(passage);

                const questionText = document.createElement('div');
                questionText.className = 'question-text';
                questionText.textContent = question.question;
                container.appendChild(questionText);

                const options = document.createElement('div');
                options.className = 'options';

                question.options.forEach((option, idx) => {
                    const opt = document.createElement('div');
                    opt.className = 'option';
                    opt.innerHTML = '<span class="option-label">' + String.fromCharCode(65 + idx) + '.</span>' + option;
                    opt.addEventListener('click', () => this.handleAnswer(idx, question.correct, question.explanation));
                    options.appendChild(opt);
                });

                container.appendChild(options);
            }

            handleAnswer(selectedIdx, correctIdx, explanation) {
                const latency = Date.now() - this.questionStartTime;
                const isCorrect = selectedIdx === correctIdx;

                const itemId = this.sessionQueue[this.sessionCurrentIndex];
                const item = this.engine.items[itemId];

                this.engine.recordAnswer(itemId, isCorrect, latency);

                this.sessionStats.questionsAnswered += 1;
                if (isCorrect) {
                    this.sessionStats.correctAnswers += 1;
                    this.sessionStats.currentStreak += 1;
                } else {
                    this.sessionStats.currentStreak = 0;
                }

                let points = isCorrect ? 10 : 0;
                if (isCorrect && this.sessionStats.currentStreak > 0 && this.sessionStats.currentStreak % 5 === 0) {
                    points += 5;
                }
                this.sessionStats.pointsEarned += points;

                this.showFeedback(isCorrect, explanation);
                this.showPointsPopup(points, isCorrect && this.sessionStats.currentStreak % 5 === 0);

                if (isCorrect && this.sessionStats.currentStreak > 0 && this.sessionStats.currentStreak % 5 === 0) {
                    this.triggerConfetti();
                }

                document.getElementById('nextBtn').classList.add('show');

                this.sessionCurrentIndex += 1;
            }

            showFeedback(isCorrect, explanation) {
                const container = document.getElementById('questionContainer');
                const feedback = document.createElement('div');
                feedback.className = 'feedback ' + (isCorrect ? 'correct' : 'incorrect');

                const label = document.createElement('div');
                label.className = 'feedback-label';
                label.textContent = isCorrect ? 'Correct!' : 'Incorrect';
                feedback.appendChild(label);

                const text = document.createElement('div');
                text.textContent = explanation;
                feedback.appendChild(text);

                container.appendChild(feedback);
            }

            showPointsPopup(points, isBonus) {
                const popup = document.createElement('div');
                popup.className = 'points-popup ' + (isBonus ? 'bonus' : 'normal');
                popup.textContent = '+' + points;

                const x = Math.random() * window.innerWidth * 0.6 + window.innerWidth * 0.2;
                const y = window.innerHeight / 2;
                popup.style.left = x + 'px';
                popup.style.top = y + 'px';

                document.body.appendChild(popup);

                setTimeout(() => popup.remove(), 2000);
            }

            triggerConfetti() {
                for (let i = 0; i < 30; i++) {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.textContent = ['🎉', '⭐', '🌟', '✨'][Math.floor(Math.random() * 4)];
                    confetti.style.left = Math.random() * window.innerWidth + 'px';
                    confetti.style.top = '-10px';
                    confetti.style.fontSize = (10 + Math.random() * 10) + 'px';
                    document.body.appendChild(confetti);

                    setTimeout(() => confetti.remove(), 3000);
                }
            }

            handleNextQuestion() {
                this.displayNextQuestion();
            }

            finishSession() {
                clearInterval(this.timerInterval);

                this.engine.globalStats.totalSessions += 1;
                this.engine.globalStats.totalPoints += this.sessionStats.pointsEarned;

                if (this.sessionStats.currentStreak > this.engine.globalStats.bestStreak) {
                    this.engine.globalStats.bestStreak = this.sessionStats.currentStreak;
                }

                this.engine.globalStats.sessionHistory.push({
                    date: new Date().toISOString(),
                    duration: this.sessionDuration,
                    questionsAnswered: this.sessionStats.questionsAnswered,
                    correctAnswers: this.sessionStats.correctAnswers,
                    pointsEarned: this.sessionStats.pointsEarned,
                    streak: this.sessionStats.currentStreak
                });

                this.engine.saveGlobalStats();

                this.showCompleteScreen();
            }

            showCompleteScreen() {
                const accuracy = Math.round((this.sessionStats.correctAnswers / this.sessionStats.questionsAnswered) * 100) || 0;

                document.getElementById('completeQuestionsCount').textContent = this.sessionStats.questionsAnswered;
                document.getElementById('completeAccuracy').textContent = accuracy + '%';
                document.getElementById('completePoints').textContent = this.sessionStats.pointsEarned;
                document.getElementById('completeStreak').textContent = this.sessionStats.currentStreak;

                let encouragement = '';
                if (accuracy >= 90) {
                    encouragement = 'Absolutely brilliant! You\'re a true English master! Keep this momentum going.';
                } else if (accuracy >= 75) {
                    encouragement = 'Excellent work! You\'re making real progress. A few more sessions and you\'ll be unstoppable!';
                } else if (accuracy >= 60) {
                    encouragement = 'Great effort! Every mistake is a chance to learn. You\'re improving each session!';
                } else {
                    encouragement = 'Good try! Keep practising and you\'ll see improvement. Every expert was once a beginner!';
                }

                document.getElementById('encouragement').textContent = encouragement;

                this.showScreen('complete');
            }

            showScreen(screenName) {
                document.querySelectorAll('.screen').forEach(screen => {
                    screen.classList.remove('active');
                });

                const screen = document.getElementById(screenName + 'Screen');
                if (screen) {
                    screen.classList.add('active');
                }

                this.currentScreen = screenName;

                if (screenName === 'start') {
                    this.updateStartScreen();
                }
            }

            goToStart() {
                this.showScreen('start');
            }
        }

        // ===== INITIALIZATION =====
        const engine = new AdaptiveEngine();
        const ui = new UIController(engine);
    </script>
</body>
</html>
