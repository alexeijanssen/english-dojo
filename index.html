<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Walter's English Dojo</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a0f2e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Start Screen */
        .screen {
            display: none;
            flex-direction: column;
            flex: 1;
        }

        .screen.active {
            display: flex;
        }

        #startScreen {
            justify-content: center;
            align-items: center;
        }

        .dojo-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .dojo-title {
            font-family: 'Fredoka', sans-serif;
            font-size: 2.5em;
            font-weight: 700;
            background: linear-gradient(135deg, #6c5ce7 0%, #a29bfe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        .dojo-subtitle {
            font-size: 1.1em;
            color: #b0b0c0;
            margin-bottom: 30px;
        }

        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: rgba(108, 92, 231, 0.1);
            border: 1px solid rgba(108, 92, 231, 0.3);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            background: rgba(108, 92, 231, 0.2);
            border-color: rgba(108, 92, 231, 0.5);
            transform: translateY(-2px);
        }

        .stat-label {
            font-size: 0.9em;
            color: #9090a0;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 2em;
            font-weight: 700;
            color: #6c5ce7;
        }

        .streak-display {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 10px;
        }

        .streak-display .fire {
            font-size: 1.5em;
        }

        .mode-buttons {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
            justify-content: center;
        }

        .btn-mode {
            flex: 0 1 200px;
            padding: 30px 40px;
            font-size: 1.4em;
            font-weight: 600;
            border: 2px solid rgba(108, 92, 231, 0.5);
            background: rgba(108, 92, 231, 0.1);
            color: #e0e0e0;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Fredoka', sans-serif;
        }

        .btn-mode:hover {
            background: rgba(108, 92, 231, 0.2);
            border-color: #6c5ce7;
            transform: scale(1.05);
        }

        .btn-mode:active {
            transform: scale(0.98);
        }

        .btn-mock {
            background: rgba(230, 126, 34, 0.15);
            border-color: rgba(230, 126, 34, 0.5);
            color: #ffa500;
        }

        .btn-mock:hover {
            background: rgba(230, 126, 34, 0.25);
            border-color: #e67e22;
            color: #ffb347;
        }

        .readiness-meter {
            margin-bottom: 30px;
        }

        .readiness-label {
            font-size: 0.9em;
            color: #9090a0;
            margin-bottom: 10px;
            text-align: center;
        }

        .readiness-bar {
            width: 100%;
            height: 12px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .readiness-fill {
            height: 100%;
            background: linear-gradient(90deg, #6c5ce7 0%, #a29bfe 100%);
            width: 50%;
            transition: width 0.3s ease;
        }

        .mastered-counter {
            text-align: center;
            font-size: 0.95em;
            color: #b0b0c0;
        }

        .topic-breakdown {
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(108, 92, 231, 0.08);
            border-radius: 8px;
        }

        .breakdown-title {
            font-size: 0.85em;
            color: #9090a0;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .breakdown-content {
            font-size: 0.8em;
            color: #b0b0c0;
            line-height: 1.6;
            word-break: break-word;
        }

        .breakdown-item {
            display: inline-block;
            margin-right: 12px;
            margin-bottom: 5px;
        }

        /* Session Screen */
        .session-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .timer {
            font-family: 'Fredoka', sans-serif;
            font-size: 2.2em;
            font-weight: 700;
            color: #6c5ce7;
            text-align: center;
            min-width: 150px;
        }

        .progress-indicator {
            text-align: center;
            font-size: 0.9em;
            color: #9090a0;
        }

        .streak-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.1em;
            color: #ff6b6b;
            font-weight: 600;
        }

        .question-container {
            background: rgba(26, 26, 46, 0.8);
            border: 1px solid rgba(108, 92, 231, 0.2);
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 30px;
            min-height: 400px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .question-type {
            font-size: 0.85em;
            color: #6c5ce7;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .question-text {
            font-size: 1.3em;
            font-weight: 500;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .vocab-sentence {
            background: rgba(108, 92, 231, 0.15);
            padding: 20px;
            border-left: 4px solid #6c5ce7;
            border-radius: 8px;
            font-size: 1.1em;
            line-height: 1.8;
            margin-bottom: 20px;
            font-style: italic;
        }

        .vocab-word {
            font-weight: 700;
            color: #a29bfe;
        }

        .spelling-sentence {
            background: rgba(108, 92, 231, 0.15);
            padding: 20px;
            border-radius: 8px;
            font-size: 1.1em;
            line-height: 1.8;
            margin-bottom: 20px;
        }

        .spelling-section {
            display: inline;
            padding: 0 4px;
            margin: 0 2px;
            border-radius: 4px;
            transition: all 0.2s ease;
        }

        .passage {
            background: rgba(108, 92, 231, 0.15);
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 25px;
            line-height: 1.8;
            font-size: 1em;
            color: #d0d0e0;
        }

        .options {
            display: grid;
            gap: 15px;
        }

        .option {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(108, 92, 231, 0.3);
            border-radius: 12px;
            padding: 18px 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: left;
            font-size: 1em;
        }

        .option:hover {
            background: rgba(108, 92, 231, 0.2);
            border-color: #6c5ce7;
            transform: translateX(8px);
        }

        .option.selected {
            background: rgba(108, 92, 231, 0.3);
            border-color: #6c5ce7;
        }

        .option-label {
            font-weight: 600;
            color: #6c5ce7;
            margin-right: 10px;
        }

        .feedback {
            margin-top: 20px;
            padding: 20px;
            border-radius: 12px;
            font-weight: 500;
            line-height: 1.6;
            display: none;
        }

        .feedback.correct {
            display: block;
            background: rgba(51, 217, 178, 0.15);
            border: 2px solid rgba(51, 217, 178, 0.5);
            color: #33d9b2;
        }

        .feedback.incorrect {
            display: block;
            background: rgba(255, 107, 107, 0.15);
            border: 2px solid rgba(255, 107, 107, 0.5);
            color: #ff6b6b;
        }

        .feedback-label {
            font-weight: 700;
            margin-bottom: 8px;
        }

        .btn-next {
            margin-top: 30px;
            padding: 15px 40px;
            font-size: 1.1em;
            font-weight: 600;
            background: linear-gradient(135deg, #6c5ce7 0%, #a29bfe 100%);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            align-self: center;
            display: none;
        }

        .btn-next.show {
            display: block;
        }

        .btn-next:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(108, 92, 231, 0.3);
        }

        .btn-next:active {
            transform: scale(0.98);
        }

        .points-popup {
            position: fixed;
            pointer-events: none;
            font-weight: 700;
            font-size: 1.5em;
            animation: popupFloat 2s ease-out forwards;
        }

        .points-popup.bonus {
            color: #ffd700;
        }

        .points-popup.normal {
            color: #6c5ce7;
        }

        @keyframes popupFloat {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-60px) scale(1.2);
            }
        }

        .confetti {
            position: fixed;
            pointer-events: none;
            animation: confettiFall 3s ease-out forwards;
        }

        @keyframes confettiFall {
            0% {
                opacity: 1;
                transform: translateY(0) rotateZ(0);
            }
            100% {
                opacity: 0;
                transform: translateY(600px) rotateZ(360deg);
            }
        }

        /* Complete Screen */
        #completeScreen {
            justify-content: center;
            align-items: center;
        }

        .complete-container {
            text-align: center;
            max-width: 600px;
        }

        .complete-title {
            font-family: 'Fredoka', sans-serif;
            font-size: 2.5em;
            font-weight: 700;
            color: #33d9b2;
            margin-bottom: 20px;
        }

        .complete-emoji {
            font-size: 3em;
            margin-bottom: 20px;
            animation: bounce 0.6s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        .summary-item {
            background: rgba(108, 92, 231, 0.1);
            border: 1px solid rgba(108, 92, 231, 0.3);
            border-radius: 12px;
            padding: 20px;
        }

        .summary-label {
            font-size: 0.9em;
            color: #9090a0;
            margin-bottom: 8px;
        }

        .summary-value {
            font-size: 1.8em;
            font-weight: 700;
            color: #6c5ce7;
        }

        .encouragement {
            font-size: 1.2em;
            color: #b0b0c0;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .btn-restart {
            padding: 15px 40px;
            font-size: 1.1em;
            font-weight: 600;
            background: linear-gradient(135deg, #6c5ce7 0%, #a29bfe 100%);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-restart:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(108, 92, 231, 0.3);
        }

        @media (max-width: 768px) {
            .dojo-title {
                font-size: 2em;
            }

            .mode-buttons {
                flex-direction: column;
            }

            .btn-mode {
                width: 100%;
            }

            .question-container {
                padding: 25px;
                min-height: auto;
            }

            .summary-grid {
                grid-template-columns: 1fr;
            }

            .session-header {
                flex-direction: column;
                align-items: center;
            }

            .timer {
                font-size: 2em;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 15px;
            }

            .dojo-title {
                font-size: 1.6em;
            }

            .dojo-subtitle {
                font-size: 0.95em;
            }

            .stats-container {
                grid-template-columns: repeat(2, 1fr);
            }

            .question-text {
                font-size: 1.1em;
            }

            .options {
                gap: 10px;
            }

            .option {
                padding: 15px;
                font-size: 0.95em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Start Screen -->
        <div id="startScreen" class="screen active">
            <div class="dojo-header">
                <div class="dojo-title">Walter's English Dojo</div>
                <div class="dojo-subtitle">Level up your 11+ English skills</div>
            </div>

            <div class="stats-container" id="statsContainer">
                <div class="stat-card">
                    <div class="stat-label">Total Points</div>
                    <div class="stat-value" id="totalPointsDisplay">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Accuracy</div>
                    <div class="stat-value" id="accuracyDisplay">—</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Best Streak</div>
                    <div class="stat-value" id="bestStreakDisplay">0</div>
                    <div class="streak-display" id="streakFireDisplay"></div>
                </div>
            </div>

            <div class="readiness-meter">
                <div class="readiness-label">Overall Readiness</div>
                <div class="readiness-bar">
                    <div class="readiness-fill" id="readinessFill"></div>
                </div>
                <div class="mastered-counter" id="masteredCounter">0 items mastered</div>
            </div>

            <div class="topic-breakdown" id="topicBreakdown">
                <div class="breakdown-title">Accuracy by Type:</div>
                <div class="breakdown-content" id="breakdownContent">
                    <!-- Populated by JavaScript -->
                </div>
            </div>

            <div class="mode-buttons">
                <button class="btn-mode" data-duration="900">15 min</button>
                <button class="btn-mode" data-duration="1800">30 min</button>
                <button class="btn-mode btn-mock" data-duration="1500" data-questions="25">Mock Exam</button>
            </div>
        </div>

        <!-- Session Screen -->
        <div id="sessionScreen" class="screen">
            <div class="session-header">
                <div class="timer" id="timer">15:00</div>
                <div class="progress-indicator" id="progressIndicator">0/0</div>
                <div class="streak-indicator" id="streakIndicator">
                    <span id="sessionPoints">0</span> <span style="font-size:0.7em;opacity:0.6;">pts</span>
                    <span id="streakIcon" style="margin-left:8px;"></span><span id="currentStreakNumber"></span>
                </div>
            </div>

            <div class="question-container" id="questionContainer">
                <!-- Dynamically populated -->
            </div>

            <button class="btn-next" id="nextBtn">Next</button>
        </div>

        <!-- Complete Screen -->
        <div id="completeScreen" class="screen">
            <div class="complete-container">
                <div class="complete-emoji">🎉</div>
                <div class="complete-title">Session Complete!</div>

                <div class="summary-grid">
                    <div class="summary-item">
                        <div class="summary-label">Questions</div>
                        <div class="summary-value" id="completeQuestionsCount">0</div>
                    </div>
                    <div class="summary-item">
                        <div class="summary-label">Accuracy</div>
                        <div class="summary-value" id="completeAccuracy">0%</div>
                    </div>
                    <div class="summary-item">
                        <div class="summary-label">Points</div>
                        <div class="summary-value" id="completePoints">0</div>
                    </div>
                    <div class="summary-item">
                        <div class="summary-label">Streak</div>
                        <div class="summary-value" id="completeStreak">0</div>
                    </div>
                </div>

                <div class="encouragement" id="encouragement"></div>

                <button class="btn-restart">Back to Home</button>
            </div>
        </div>
    </div>

    <script>
        // ===== STATE MANAGEMENT =====
        const STATE_KEY = 'walterDojo';
        const ITEMS_KEY = 'walterDojoItems';

        class AdaptiveEngine {
            constructor() {
                this.items = this.loadItems();
                this.globalStats = this.loadGlobalStats();
                this.currentSession = null;
            }

            loadItems() {
                const saved = localStorage.getItem(ITEMS_KEY);
                if (saved) {
                    try {
                        return JSON.parse(saved);
                    } catch (e) {
                        console.error('Failed to load items:', e);
                        return this.initializeItems();
                    }
                }
                return this.initializeItems();
            }

            initializeItems() {
                const items = {};
                const allQuestions = [
                    ...VOCAB_QUESTIONS,
                    ...SPELLING_QUESTIONS,
                    ...PUNCTUATION_QUESTIONS,
                    ...COMPREHENSION_QUESTIONS,
                    ...CLOZE_QUESTIONS,
                    ...SYNONYM_QUESTIONS,
                    ...ANTONYM_QUESTIONS
                ];

                allQuestions.forEach((q, idx) => {
                    const id = `${q.type}-${idx}`;
                    items[id] = {
                        id,
                        type: q.type,
                        recall: null,
                        stability: 0.5,
                        difficulty: 0.5,
                        lastReview: null,
                        lapseCount: 0,
                        encounters: 0,
                        correctCount: 0,
                        avgLatency: 0,
                        tags: [q.type]
                    };
                });

                return items;
            }

            loadGlobalStats() {
                const saved = localStorage.getItem(STATE_KEY);
                if (saved) {
                    try {
                        return JSON.parse(saved);
                    } catch (e) {
                        console.error('Failed to load stats:', e);
                        return this.getDefaultStats();
                    }
                }
                return this.getDefaultStats();
            }

            getDefaultStats() {
                return {
                    totalPoints: 0,
                    bestStreak: 0,
                    currentStreak: 0,
                    totalSessions: 0,
                    sessionHistory: [],
                    firstUseTimestamp: Date.now()
                };
            }

            saveItems() {
                localStorage.setItem(ITEMS_KEY, JSON.stringify(this.items));
            }

            saveGlobalStats() {
                localStorage.setItem(STATE_KEY, JSON.stringify(this.globalStats));
            }

            calculateRecall(item) {
                if (item.recall === null || item.lastReview === null) {
                    return 0;
                }
                const now = Date.now();
                const timeSinceReview = (now - item.lastReview) / (1000 * 60 * 60 * 24);
                const t = timeSinceReview;
                const S = item.stability;
                const recall = Math.exp(-t / S);
                return Math.max(0, Math.min(1, recall));
            }

            recalculateAllRecalls() {
                Object.keys(this.items).forEach(id => {
                    const item = this.items[id];
                    if (item.lastReview !== null) {
                        item.recall = this.calculateRecall(item);
                    }
                });
            }

            getAverageRecall() {
                const reviewedItems = Object.values(this.items).filter(item => item.recall !== null);
                if (reviewedItems.length === 0) return 0;
                const avg = reviewedItems.reduce((sum, item) => sum + item.recall, 0) / reviewedItems.length;
                return avg;
            }

            getMasteredCount() {
                return Object.values(this.items).filter(item => {
                    return item.recall !== null && item.recall > 0.85 && item.stability > 7;
                }).length;
            }

            getOverallAccuracy() {
                const reviewedItems = Object.values(this.items).filter(item => item.encounters > 0);
                if (reviewedItems.length === 0) return null;
                const totalEncounters = reviewedItems.reduce((sum, item) => sum + item.encounters, 0);
                const totalCorrect = reviewedItems.reduce((sum, item) => sum + item.correctCount, 0);
                if (totalEncounters === 0) return null;
                return Math.round((totalCorrect / totalEncounters) * 100);
            }

            getAccuracyByType() {
                const typeAccuracy = {};
                const types = ['vocab', 'spelling', 'punctuation', 'comprehension', 'cloze', 'synonym', 'antonym'];

                types.forEach(type => {
                    const typeItems = Object.values(this.items).filter(item => item.type === type && item.encounters > 0);
                    if (typeItems.length === 0) {
                        typeAccuracy[type] = null;
                    } else {
                        const totalEncounters = typeItems.reduce((sum, item) => sum + item.encounters, 0);
                        const totalCorrect = typeItems.reduce((sum, item) => sum + item.correctCount, 0);
                        typeAccuracy[type] = Math.round((totalCorrect / totalEncounters) * 100);
                    }
                });

                return typeAccuracy;
            }

            buildSessionQueue(targetQuestions, maxNewItems = 4) {
                this.recalculateAllRecalls();

                const lapsed = [];
                const due = [];
                const newItems = [];

                Object.entries(this.items).forEach(([id, item]) => {
                    if (item.lapseCount > 0 && item.recall < 0.3) {
                        lapsed.push([id, item, item.recall]);
                    } else if (item.recall !== null && item.recall < 0.7) {
                        due.push([id, item, item.recall]);
                    } else if (item.encounters === 0) {
                        newItems.push([id, item]);
                    }
                });

                due.sort((a, b) => a[2] - b[2]);

                // Shuffle new items so we get variety across types
                for (let i = newItems.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [newItems[i], newItems[j]] = [newItems[j], newItems[i]];
                }

                // If no items have been reviewed yet, allow more new items
                const totalEncountered = Object.values(this.items).filter(it => it.encounters > 0).length;
                const effectiveMaxNew = totalEncountered === 0 ? targetQuestions : maxNewItems;

                const queue = [];

                lapsed.forEach(([id, item]) => {
                    if (queue.length < targetQuestions) {
                        queue.push(id);
                    }
                });

                due.forEach(([id, item]) => {
                    if (queue.length < targetQuestions) {
                        queue.push(id);
                    }
                });

                let usedNewItems = 0;
                newItems.forEach(([id, item]) => {
                    if (queue.length < targetQuestions && usedNewItems < effectiveMaxNew) {
                        queue.push(id);
                        usedNewItems++;
                    }
                });

                return this.interleaveTypes(queue);
            }

            interleaveTypes(queue) {
                // Group items by type
                const byType = {};
                queue.forEach(id => {
                    const t = this.items[id].type;
                    if (!byType[t]) byType[t] = [];
                    byType[t].push(id);
                });

                // Round-robin interleave across types
                const types = Object.keys(byType);
                const result = [];
                let round = 0;
                let added = true;
                while (added && result.length < queue.length) {
                    added = false;
                    for (const t of types) {

            { type: 'comprehension', passage: 'The fox slipped through the gap in the fence as silently as smoke. It paused, one paw raised, ears swivelling like satellite dishes. Satisfied, it trotted across the moonlit lawn towards the henhouse. But tonight, the farmer had left a surprise.', question: 'What is the purpose of the last sentence?', options: ['To make the reader feel sorry for the fox.', 'To create suspense and make the reader want to know what happens next.', 'To show that the farmer is cruel.', 'To describe the henhouse.'], correct: 1, explanation: 'Short sentence creates a cliffhanger.' },
            { type: 'comprehension', passage: 'Miss Avery never raised her voice. When the class grew noisy, she simply stopped talking and waited, her gaze steady and patient. One by one, like candles being snuffed out, the conversations died until the room was silent. Then, and only then, did she continue.', question: 'What does the simile "like candles being snuffed out" suggest?', options: ['The classroom was dark.', 'The conversations ended quickly and completely, one by one.', 'The children were scared of Miss Avery.', 'The children were bored.'], correct: 1, explanation: 'Candles snuffed out one by one — conversations stop steadily.' },
            { type: 'comprehension', passage: 'Emma found a mysterious letter in her grandmother\'s attic. It was dated 1952 and written in a language she didn\'t recognise. She carefully cleaned the old paper and decided to show it to her teacher. Within days, the teacher had translated it. It was a love letter from her grandmother\'s past.', question: 'Why did Emma show the letter to her teacher?', options: ['She wanted to read it aloud', 'She couldn\'t understand the language it was written in', 'She wanted to make a copy of it', 'She thought it was valuable'], correct: 1, explanation: 'The passage states she "didn\'t recognise" the language and then decided to show the teacher.' },
            { type: 'comprehension', passage: 'The old library was due to close because the town had limited funding. Local volunteers started a campaign to save it. They collected over 5,000 signatures on a petition. When the petition was presented to the town council, the decision was reversed. The library remains open today.', question: 'What was the key to saving the library?', options: ['Extra government funding', 'Community support through a petition', 'The librarian\'s persuasive speech', 'A wealthy donor'], correct: 1, explanation: 'The passage shows the petition with 5,000 signatures led to the reversed decision.' },
            { type: 'comprehension', passage: 'Maxine loves coding and spends hours creating programs. Her friends think it\'s boring, but she finds it fascinating. When a local tech company needed young programmers, Maxine applied. They were impressed by her portfolio and hired her immediately.', question: 'What can we infer about Maxine\'s skills?', options: ['She learned coding in school', 'She is more skilled than her friends', 'She spent time developing her abilities', 'She is the best programmer in the world'], correct: 2, explanation: 'The passage shows she spends hours coding and impressed a tech company with her portfolio.' },
            { type: 'comprehension', passage: 'The river once flowed clear and full. Factories upstream began dumping waste into it. Fish died. Plants disappeared. The water turned grey. Environmental groups demanded action. New laws were passed banning the pollution. Slowly, the river began to recover.', question: 'What does this passage suggest about environmental laws?', options: ['They are always ineffective', 'They can help reverse damage when enforced', 'They come too late to help', 'Nature cannot be restored'], correct: 1, explanation: 'The passage shows that after laws were passed, "the river began to recover".' },
            { type: 'comprehension', passage: 'Jamie\'s family moved to a new house far from her school. She felt lonely at first. Then she joined the school art club. She made friends who shared her interests. By the end of the year, she loved her new neighbourhood.', question: 'How did Jamie overcome her loneliness?', options: ['She asked her parents to move back', 'She spent more time at home', 'She joined a club and made friends', 'She changed schools'], correct: 2, explanation: 'The passage clearly states she joined the art club and made friends.' },
            { type: 'comprehension', passage: 'The penguin colony numbered over 10,000 birds. Rising ocean temperatures reduced their food supply. Within five years, only 3,000 penguins remained. Scientists warned that without action, the species might disappear. Conservation efforts began immediately.', question: 'What is the main problem facing the penguins?', options: ['They have no shelter', 'Their habitat is too cold', 'Their food source is diminishing due to climate change', 'They are hunted for fur'], correct: 2, explanation: 'The passage states "rising ocean temperatures reduced their food supply".' },
            { type: 'comprehension', passage: 'In ancient Egypt, scribes were highly respected. They spent years learning to read and write hieroglyphics. Only about 1% of the population could read. Scribes held positions of power in government and temples. Their skill was their greatest asset.', question: 'Why were scribes so powerful in ancient Egypt?', options: ['They were born into important families', 'Their literacy skill was rare and valued', 'They fought in wars', 'They were the wealthiest people'], correct: 1, explanation: 'The passage shows that literacy was rare (only 1%) and scribes held positions of power because of their skill.' },
            { type: 'comprehension', passage: 'During the pandemic, schools closed and teachers had to adapt quickly. Some used video lessons, others sent printed materials. A few teachers became ill and weren\'t able to teach. Students struggled without the social connection and routine. By the next year, schools reopened, though some changes remained.', question: 'What can we infer was a challenge for students during school closures?', options: ['Teachers didn\'t care about their education', 'They lost both learning and social connection', 'They had too much free time', 'Technology was unavailable'], correct: 1, explanation: 'The passage mentions students "struggled without the social connection and routine".' },
            { type: 'comprehension', passage: 'The cafe owner noticed fewer customers each month. She realised the new shopping centre across the street was taking her business. She couldn\'t afford the rent increase the landlord demanded. Within six months, she closed the cafe. The building sat empty for two years.', question: 'What sequence of events led to the cafe\'s closure?', options: ['The owner wanted to retire', 'Competition increased, rent rose, and the owner couldn\'t afford it', 'Customers moved to a different neighbourhood', 'The cafe was too old'], correct: 1, explanation: 'The passage describes losing customers, being unable to afford higher rent, then closing.' },
            { type: 'comprehension', passage: 'Marcus practiced basketball every day. He spent hours perfecting his shots. He watched professional players to learn their techniques. His hard work paid off when he was selected for the regional team. Dedication had made his dream possible.', question: 'What does the passage suggest about achievement?', options: ['Some people are naturally talented', 'Success requires consistent practice and effort', 'Natural talent is not necessary', 'Hard work guarantees success'], correct: 1, explanation: 'The passage shows Marcus\'s daily practice and dedicated work led to his selection.' },
            { type: 'comprehension', passage: 'Sophie always felt anxious before tests. She started practising meditation and deep breathing a month before her exams. She slept better and worried less. On test day, she felt calmer. Her grades improved significantly.', question: 'How did meditation help Sophie?', options: ['It cured her anxiety completely', 'It helped her study better', 'It reduced her stress and improved her performance', 'It helped her friends'], correct: 2, explanation: 'The passage shows meditation helped her sleep better, worry less, and feel calmer, leading to better grades.' },
            { type: 'comprehension', passage: 'The town had no public park for children to play in. A group of residents began planning a community garden project. They raised funds through donations and volunteers cleared an empty lot. Within a year, the park was finished with swings, slides, and flowerbeds. The community worked together to create something special.', question: 'What does this passage show about community action?', options: ['Government must provide all public services', 'Communities can create change through cooperation', 'Parks are not important for children', 'Money is the only barrier to progress'], correct: 1, explanation: 'The passage demonstrates how residents together planned, raised funds, and created a park.' },
            { type: 'comprehension', passage: 'The ancient library at Alexandria held thousands of scrolls. Scholars travelled from distant lands to study there. Wars and fires eventually destroyed much of the collection. Today, only fragments remain. Historians still study these pieces to understand the past.', question: 'What do the surviving fragments suggest?', options: ['Ancient knowledge was useless', 'The library was not important', 'The knowledge preserved was valuable enough to study', 'We can never learn from the past'], correct: 2, explanation: 'The passage shows historians still study the remaining fragments, indicating the value of what survived.' },
            { type: 'comprehension', passage: 'A teenager noticed her younger brother struggling with reading. She started reading to him every evening. At first, he resisted and felt embarrassed. Gradually, he became interested in the stories. Six months later, his reading skills had improved significantly.', question: 'Why did the brother\'s reading improve?', options: ['He was forced to read', 'His sister provided patient support and made reading enjoyable', 'He went to a special school', 'His teacher gave him extra homework'], correct: 1, explanation: 'The passage shows the sister\'s consistent support and making reading enjoyable led to improvement.' },
            { type: 'comprehension', passage: 'The mobile phone was invented to make communication easier. Yet some people now say we are "always connected but never truly together". They point to families sitting silently, each person on their own device. What is lost when we prioritise screens over presence?', question: 'What concern does the author raise about mobile phones?', options: ['They are too expensive', 'They prevent face-to-face connection and presence', 'They are bad for your health', 'They are too complicated'], correct: 1, explanation: 'The author questions whether technology is replacing genuine human connection and presence.' },
            { type: 'comprehension', passage: 'In colonial India, the salt monopoly meant only the government could sell salt. Indians had to pay high taxes on this essential commodity. Mahatma Gandhi led thousands to the sea to make their own salt illegally. This simple act of civil disobedience inspired a nation. It became a turning point in the independence movement.', question: 'Why was Gandhi\'s salt march significant?', options: ['It made salt cheaper', 'It showed how ordinary people could resist injustice through peaceful means', 'It eliminated all taxes', 'It proved salt was unnecessary'], correct: 1, explanation: 'The passage shows the salt march inspired a nation and became a turning point in the independence movement.' },
            { type: 'comprehension', passage: 'The forest fires spread rapidly across three counties. Firefighters worked day and night to control them. Hundreds of homes were evacuated. Ash fell like snow for miles around. The fires were finally contained after two weeks of intensive effort.', question: 'What does the passage emphasise about the fires?', options: ['They were controlled easily', 'They were devastating and required sustained effort to contain', 'They only affected forests', 'They lasted one day'], correct: 1, explanation: 'The passage shows the fires spread rapidly, required days of work, affected homes, and took two weeks to contain.' },
            { type: 'comprehension', passage: 'Dr. Patel developed a new technique for treating diabetes. She tested it in laboratories first, then in clinical trials with volunteers. After five years of research, the treatment proved effective and safe. Today, thousands of patients benefit from her work. Her persistence changed lives.', question: 'What does the passage show about medical research?', options: ['It happens quickly', 'It requires long-term testing and persistence before success', 'Only doctors can conduct research', 'Results are never certain'], correct: 1, explanation: 'The passage shows five years of testing in labs and clinical trials were needed before success.' },
            { type: 'comprehension', passage: 'The small bakery had been in the same family for three generations. The owner, now 70 years old, wanted to retire. Her daughter wanted a different career. No one in the family was willing to take over. With no successor, the bakery closed its doors forever.', question: 'Why couldn\'t the bakery continue?', options: ['It was not profitable', 'The owner didn\'t want to work', 'No family member wanted to continue the business', 'The building was too old'], correct: 2, explanation: 'The passage states the owner wanted to retire, her daughter wanted a different career, and no one else was willing to take over.' },
            { type: 'comprehension', passage: 'Every morning, Mr. Chen took the same route through the park. He greeted neighbours, fed the birds, and sat on his favourite bench. One day, construction began. The park would be destroyed for a shopping centre. Mr. Chen felt heartbroken watching his beloved space disappear.', question: 'What does this passage show about places we love?', options: ['They are never permanent', 'Losing familiar places can cause emotional pain', 'Change is always good', 'Shopping centres are always beneficial'], correct: 1, explanation: 'The passage shows Mr. Chen\'s emotional attachment to the park and his heartbreak at its destruction.' },
            { type: 'comprehension', passage: 'The recipe had been passed down through five generations. Maria\'s grandmother taught her mother, who taught Maria. The secret ingredient was a special spice blend. When Maria\'s cousin asked to learn, Maria felt conflicted. Should family traditions stay private or be shared?', question: 'What dilemma does Maria face?', options: ['Whether to move away', 'Whether to share a family tradition or keep it private', 'Whether to open a restaurant', 'Whether to work in the family business'], correct: 1, explanation: 'The passage shows Maria\'s internal conflict about whether to share the secret family recipe.' },
            { type: 'comprehension', passage: 'Scientists discovered that certain plants could remove toxins from polluted soil. They began growing these plants in contaminated areas. After three years, the soil quality improved dramatically. This "green solution" cost less than traditional methods and helped the environment. Nature\'s own cleaning power proved remarkably effective.', question: 'What advantage do the plants offer over traditional cleaning methods?', options: ['They work faster', 'They are cheaper and environmentally friendly', 'They remove all pollution', 'They require no maintenance'], correct: 1, explanation: 'The passage states the method "cost less than traditional methods and helped the environment".' },
            { type: 'comprehension', passage: 'The athlete injured her knee during training. Doctors said she might never compete again. She refused to accept this. For two years, she underwent intense rehabilitation. Against all odds, she returned to competition and won a medal at the Olympics.', question: 'What quality did the athlete demonstrate?', options: ['She was lucky', 'She had exceptional determination and refused to give up', 'She didn\'t listen to medical advice', 'She worked harder than others naturally'], correct: 1, explanation: 'The passage shows she refused to accept the prognosis and underwent two years of intense rehabilitation.' },

            { type: 'comprehension', passage: 'In a bustling city, a community garden flourished on an abandoned lot. Residents grew vegetables together, regardless of their backgrounds or languages. The garden became a place where neighbours became friends. It proved that small green spaces create big social connections. The garden showed the power of shared purpose.', question: 'What is the main message of this passage?', options: ['Cities are too crowded', 'Vegetables are better than flowers', 'Shared community spaces can build human connection', 'Only certain people should garden'], correct: 2, explanation: 'The passage emphasises how the garden brought diverse neighbours together and created friendships.' }

        // ===== UI CONTROLLER =====
        class UIController {
            constructor(engine) {
                this.engine = engine;
                this.currentScreen = 'start';
                this.sessionDuration = null;
                this.sessionQueue = [];
                this.sessionCurrentIndex = 0;
                this.sessionStartTime = null;
                this.sessionStats = null;
                this.timerInterval = null;
                this.questionStartTime = null;

                this.setupEventListeners();
                this.render();
            }

            setupEventListeners() {
                document.querySelectorAll('.btn-mode').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const duration = parseInt(e.target.dataset.duration);
                        const targetQuestions = e.target.dataset.questions ? parseInt(e.target.dataset.questions) : undefined;
                        this.startSession(duration, targetQuestions);
                    });
                });

                document.getElementById('nextBtn').addEventListener('click', () => {
                    this.handleNextQuestion();
                });

                const restartBtn = document.querySelector('.btn-restart');
                if (restartBtn) {
                    restartBtn.addEventListener('click', () => {
                        this.goToStart();
                    });
                }
            }

            render() {
                this.updateStartScreen();
            }

            updateStartScreen() {
                document.getElementById('totalPointsDisplay').textContent = this.engine.globalStats.totalPoints;
                const accuracy = this.engine.getOverallAccuracy();
                document.getElementById('accuracyDisplay').textContent = accuracy !== null ? accuracy + '%' : '—';

                const bestStreak = this.engine.globalStats.bestStreak;
                document.getElementById('bestStreakDisplay').textContent = bestStreak;

                const streakFireDisplay = document.getElementById('streakFireDisplay');
                streakFireDisplay.innerHTML = '';
                if (bestStreak >= 2) {
                    streakFireDisplay.innerHTML = '<span class="fire">🔥</span><span>' + bestStreak + '</span>';
                }

                const avgRecall = this.engine.getAverageRecall();
                document.getElementById('readinessFill').style.width = (avgRecall * 100) + '%';

                const mastered = this.engine.getMasteredCount();
                document.getElementById('masteredCounter').textContent = mastered + ' items mastered';

                // Update topic breakdown
                const accuracyByType = this.engine.getAccuracyByType();
                const breakdownContent = document.getElementById('breakdownContent');
                breakdownContent.innerHTML = '';

                const types = ['vocab', 'spelling', 'punctuation', 'comprehension', 'cloze', 'synonym', 'antonym'];
                types.forEach(type => {
                    const item = document.createElement('span');
                    item.className = 'breakdown-item';
                    const accuracy = accuracyByType[type];
                    const displayType = type.charAt(0).toUpperCase() + type.slice(1);
                    item.textContent = displayType + ': ' + (accuracy !== null ? accuracy + '%' : '—');
                    item.style.color = accuracy === null ? '#808090' : (accuracy >= 80 ? '#00b894' : accuracy >= 60 ? '#f39c12' : '#e17055');
                    breakdownContent.appendChild(item);
                });
            }

            startSession(duration, targetQuestions) {
                this.sessionDuration = duration;
                this.sessionStartTime = Date.now();

                if (targetQuestions === undefined) {
                    targetQuestions = duration === 900 ? 20 : 40;
                }

                this.sessionQueue = this.engine.buildSessionQueue(targetQuestions, 4);

                this.sessionStats = {
                    questionsAnswered: 0,
                    correctAnswers: 0,
                    pointsEarned: 0,
                    currentStreak: 0,
                    startTime: Date.now()
                };

                this.sessionCurrentIndex = 0;
                this.showScreen('session');
                this.startTimer();
                this.displayNextQuestion();
            }

            startTimer() {
                let timeRemaining = this.sessionDuration;

                this.timerInterval = setInterval(() => {
                    timeRemaining -= 1;

                    const minutes = Math.floor(timeRemaining / 60);
                    const seconds = timeRemaining % 60;
                    const display = String(minutes).padStart(2, '0') + ':' + String(seconds).padStart(2, '0');

                    document.getElementById('timer').textContent = display;

                    if (timeRemaining <= 0) {
                        clearInterval(this.timerInterval);
                        this.finishSession();
                    }
                }, 1000);
            }

            displayNextQuestion() {
                this.answered = false;
                if (this.sessionCurrentIndex >= this.sessionQueue.length) {
                    this.finishSession();
                    return;
                }

                const itemId = this.sessionQueue[this.sessionCurrentIndex];
                const item = this.engine.items[itemId];
                const question = this.getQuestionData(item);

                document.getElementById('progressIndicator').textContent =
                    (this.sessionCurrentIndex + 1) + '/' + Math.min(this.sessionQueue.length, 50);

                const streakNumber = this.sessionStats.currentStreak;
                document.getElementById('currentStreakNumber').textContent = streakNumber;
                document.getElementById('streakIcon').textContent = streakNumber > 0 ? '🔥' : '';

                document.getElementById('nextBtn').classList.remove('show');
                const feedback = document.querySelector('.feedback');
                if (feedback) {
                    feedback.remove();
                }

                this.renderQuestion(item, question);

                this.questionStartTime = Date.now();
            }

            getQuestionData(item) {
                const allQuestions = [
                    ...VOCAB_QUESTIONS,
                    ...SPELLING_QUESTIONS,
                    ...PUNCTUATION_QUESTIONS,
                    ...COMPREHENSION_QUESTIONS,
                    ...CLOZE_QUESTIONS,
                    ...SYNONYM_QUESTIONS,
                    ...ANTONYM_QUESTIONS
                ];

                let typeIndex = 0;
                for (let i = 0; i < allQuestions.length; i++) {
                    if (allQuestions[i].type === item.type) {
                        if (typeIndex === this.getTypeIndexForItem(item)) {
                            return allQuestions[i];
                        }
                        typeIndex++;
                    }
                }

                return allQuestions[0];
            }

            getTypeIndexForItem(item) {
                let index = 0;
                const allQuestions = [
                    ...VOCAB_QUESTIONS,
                    ...SPELLING_QUESTIONS,
                    ...PUNCTUATION_QUESTIONS,
                    ...COMPREHENSION_QUESTIONS,
                    ...CLOZE_QUESTIONS,
                    ...SYNONYM_QUESTIONS,
                    ...ANTONYM_QUESTIONS
                ];

                for (let q of allQuestions) {
                    if (q.type === item.type) {
                        if (item.id === item.type + '-' + index) {
                            return index;
                        }
                        index++;
                    }
                }

                return 0;
            }

            renderQuestion(item, question) {
                const container = document.getElementById('questionContainer');
                container.innerHTML = '';

                const typeLabel = document.createElement('div');
                typeLabel.className = 'question-type';
                typeLabel.textContent = item.type.toUpperCase();
                container.appendChild(typeLabel);

                if (item.type === 'vocab') {
                    this.renderVocabQuestion(container, question);
                } else if (item.type === 'spelling') {
                    this.renderSpellingQuestion(container, question);
                } else if (item.type === 'punctuation') {
                    this.renderPunctuationQuestion(container, question);
                } else if (item.type === 'comprehension') {
                    this.renderComprehensionQuestion(container, question);
                } else if (item.type === 'cloze') {
                    this.renderClozeQuestion(container, question);
                } else if (item.type === 'synonym') {
                    this.renderSynonymQuestion(container, question);
                } else if (item.type === 'antonym') {
                    this.renderAntonymQuestion(container, question);
                }
            }

            renderVocabQuestion(container, question) {
                const sentence = document.createElement('div');
                sentence.className = 'vocab-sentence';
                const parts = question.sentence.split(question.word);
                sentence.appendChild(document.createTextNode(parts[0]));
                const word = document.createElement('span');
                word.className = 'vocab-word';
                word.textContent = question.word;
                sentence.appendChild(word);
                sentence.appendChild(document.createTextNode(parts[1]));
                container.appendChild(sentence);

                const questionText = document.createElement('div');
                questionText.className = 'question-text';
                questionText.textContent = 'What does ' + question.word + ' mean?';
                container.appendChild(questionText);

                const options = document.createElement('div');
                options.className = 'options';

                question.options.forEach((option, idx) => {
                    const opt = document.createElement('div');
                    opt.className = 'option';
                    opt.innerHTML = '<span class="option-label">' + String.fromCharCode(65 + idx) + '.</span>' + option;
                    opt.addEventListener('click', () => this.handleAnswer(idx, question.correct, question.explanation));
                    options.appendChild(opt);
                });

                container.appendChild(options);
            }

            renderSpellingQuestion(container, question) {
                const sentence = document.createElement('div');
                sentence.className = 'spelling-sentence';

                question.sections.forEach((section, idx) => {
                    const span = document.createElement('span');
                    span.className = 'spelling-section';
                    if (idx === 0) span.style.backgroundColor = 'rgba(108, 92, 231, 0.2)';
                    if (idx === 1) span.style.backgroundColor = 'rgba(162, 155, 254, 0.2)';
                    if (idx === 2) span.style.backgroundColor = 'rgba(108, 92, 231, 0.15)';
                    span.textContent = section;
                    sentence.appendChild(span);
                    sentence.appendChild(document.createTextNode(' '));
                });

                container.appendChild(sentence);

                const questionText = document.createElement('div');
                questionText.className = 'question-text';
                questionText.textContent = 'Which section (if any) has a spelling error?';
                container.appendChild(questionText);

                const options = document.createElement('div');
                options.className = 'options';

                const labels = ['A', 'B', 'C', 'No error'];
                [0, 1, 2, -1].forEach((idx, i) => {
                    const opt = document.createElement('div');
                    opt.className = 'option';
                    opt.innerHTML = '<span class="option-label">' + labels[i] + '.</span>' + (idx === -1 ? 'No error' : 'Section ' + labels[i]);
                    opt.addEventListener('click', () => this.handleAnswer(idx, question.correct, question.explanation));
                    options.appendChild(opt);
                });

                container.appendChild(options);
            }

            renderPunctuationQuestion(container, question) {
                const questionText = document.createElement('div');
                questionText.className = 'question-text';
                questionText.textContent = 'Which option is correctly punctuated?';
                container.appendChild(questionText);

                const currentSentence = document.createElement('div');
                currentSentence.style.cssText = 'background: rgba(108, 92, 231, 0.15); padding: 15px; border-radius: 8px; margin-bottom: 20px; font-style: italic; color: #d0d0e0;';
                currentSentence.textContent = question.sentence;
                container.appendChild(currentSentence);

                const options = document.createElement('div');
                options.className = 'options';

                question.options.forEach((option, idx) => {
                    const opt = document.createElement('div');
                    opt.className = 'option';
                    opt.innerHTML = '<span class="option-label">' + String.fromCharCode(65 + idx) + '.</span>' + option;
                    opt.addEventListener('click', () => this.handleAnswer(idx, question.correct, question.explanation));
                    options.appendChild(opt);
                });

                container.appendChild(options);
            }

            renderComprehensionQuestion(container, question) {
                const passage = document.createElement('div');
                passage.className = 'passage';
                passage.textContent = question.passage;
                container.appendChild(passage);

                const questionText = document.createElement('div');
                questionText.className = 'question-text';
                questionText.textContent = question.question;
                container.appendChild(questionText);

                const options = document.createElement('div');
                options.className = 'options';

                question.options.forEach((option, idx) => {
                    const opt = document.createElement('div');
                    opt.className = 'option';
                    opt.innerHTML = '<span class="option-label">' + String.fromCharCode(65 + idx) + '.</span>' + option;
                    opt.addEventListener('click', () => this.handleAnswer(idx, question.correct, question.explanation));
                    options.appendChild(opt);
                });

                container.appendChild(options);
            }

            renderClozeQuestion(container, question) {
                const sentence = document.createElement('div');
                sentence.className = 'cloze-sentence';
                const parts = question.sentence.split('_____');
                sentence.appendChild(document.createTextNode(parts[0]));
                const blank = document.createElement('span');
                blank.className = 'cloze-blank';
                blank.textContent = '_____';
                sentence.appendChild(blank);
                sentence.appendChild(document.createTextNode(parts[1]));
                container.appendChild(sentence);

                const questionText = document.createElement('div');
                questionText.className = 'question-text';
                questionText.textContent = 'Complete the sentence:';
                container.appendChild(questionText);

                const options = document.createElement('div');
                options.className = 'options';

                question.options.forEach((option, idx) => {
                    const opt = document.createElement('div');
                    opt.className = 'option';
                    opt.innerHTML = '<span class="option-label">' + String.fromCharCode(65 + idx) + '.</span>' + option;
                    opt.addEventListener('click', () => this.handleAnswer(idx, question.correct, question.explanation));
                    options.appendChild(opt);
                });

                container.appendChild(options);
            }

            renderSynonymQuestion(container, question) {
                const questionText = document.createElement('div');
                questionText.className = 'question-text';
                questionText.textContent = 'Which word is closest in meaning to:';
                container.appendChild(questionText);

                const word = document.createElement('div');
                word.className = 'vocab-word';
                word.style.cssText = 'background: rgba(108, 92, 231, 0.15); padding: 15px; border-radius: 8px; margin-bottom: 20px; font-weight: bold; text-align: center; font-size: 1.1em;';
                word.textContent = question.word;
                container.appendChild(word);

                const options = document.createElement('div');
                options.className = 'options';

                question.options.forEach((option, idx) => {
                    const opt = document.createElement('div');
                    opt.className = 'option';
                    opt.innerHTML = '<span class="option-label">' + String.fromCharCode(65 + idx) + '.</span>' + option;
                    opt.addEventListener('click', () => this.handleAnswer(idx, question.correct, question.explanation));
                    options.appendChild(opt);
                });

                container.appendChild(options);
            }

            renderAntonymQuestion(container, question) {
                const questionText = document.createElement('div');
                questionText.className = 'question-text';
                questionText.textContent = 'Which word is opposite in meaning to:';
                container.appendChild(questionText);

                const word = document.createElement('div');
                word.className = 'vocab-word';
                word.style.cssText = 'background: rgba(108, 92, 231, 0.15); padding: 15px; border-radius: 8px; margin-bottom: 20px; font-weight: bold; text-align: center; font-size: 1.1em;';
                word.textContent = question.word;
                container.appendChild(word);

                const options = document.createElement('div');
                options.className = 'options';

                question.options.forEach((option, idx) => {
                    const opt = document.createElement('div');
                    opt.className = 'option';
                    opt.innerHTML = '<span class="option-label">' + String.fromCharCode(65 + idx) + '.</span>' + option;
                    opt.addEventListener('click', () => this.handleAnswer(idx, question.correct, question.explanation));
                    options.appendChild(opt);
                });

                container.appendChild(options);
            }

            handleAnswer(selectedIdx, correctIdx, explanation) {
                if (this.answered) return;
                this.answered = true;
                const latency = Date.now() - this.questionStartTime;
                const isCorrect = selectedIdx === correctIdx;

                // Highlight correct and wrong options
                const allOptions = document.querySelectorAll('.option');
                allOptions.forEach((opt, idx) => {
                    if (idx === correctIdx) {
                        opt.style.borderColor = '#00b894';
                        opt.style.background = 'rgba(0,184,148,0.15)';
                    } else if (idx === selectedIdx && !isCorrect) {
                        opt.style.borderColor = '#e17055';
                        opt.style.background = 'rgba(225,112,85,0.15)';
                    }
                });

                const itemId = this.sessionQueue[this.sessionCurrentIndex];
                const item = this.engine.items[itemId];

                this.engine.recordAnswer(itemId, isCorrect, latency);

                this.sessionStats.questionsAnswered += 1;
                if (isCorrect) {
                    this.sessionStats.correctAnswers += 1;
                    this.sessionStats.currentStreak += 1;
                } else {
                    this.sessionStats.currentStreak = 0;
                }

                let points = isCorrect ? 10 : 0;
                if (isCorrect && this.sessionStats.currentStreak > 0 && this.sessionStats.currentStreak % 5 === 0) {
                    points += 5;
                }
                this.sessionStats.pointsEarned += points;

                this.showFeedback(isCorrect, explanation);
                this.showPointsPopup(points, isCorrect && this.sessionStats.currentStreak > 0 && this.sessionStats.currentStreak % 5 === 0);

                if (isCorrect && this.sessionStats.currentStreak > 0 && this.sessionStats.currentStreak % 5 === 0) {
                    this.triggerConfetti();
                }

                // Update session header live
                document.getElementById('sessionPoints').textContent = this.sessionStats.pointsEarned;
                const streak = this.sessionStats.currentStreak;
                document.getElementById('currentStreakNumber').textContent = streak > 0 ? streak : '';
                document.getElementById('streakIcon').textContent = streak >= 2 ? '🔥' : '';
                document.getElementById('progressIndicator').textContent =
                    (this.sessionCurrentIndex + 1) + '/' + Math.min(this.sessionQueue.length, 50);

                // Disable option buttons after answering
                document.querySelectorAll('.option').forEach(opt => {
                    opt.style.pointerEvents = 'none';
                });

                document.getElementById('nextBtn').classList.add('show');

                this.sessionCurrentIndex += 1;
            }

            showFeedback(isCorrect, explanation) {
                const container = document.getElementById('questionContainer');
                const feedback = document.createElement('div');
                feedback.className = 'feedback ' + (isCorrect ? 'correct' : 'incorrect');

                const label = document.createElement('div');
                label.className = 'feedback-label';
                label.textContent = isCorrect ? 'Correct!' : 'Incorrect';
                feedback.appendChild(label);

                const text = document.createElement('div');
                text.textContent = explanation;
                feedback.appendChild(text);

                container.appendChild(feedback);
            }

            showPointsPopup(points, isBonus) {
                const popup = document.createElement('div');
                popup.className = 'points-popup ' + (isBonus ? 'bonus' : 'normal');
                popup.textContent = '+' + points;

                const x = Math.random() * window.innerWidth * 0.6 + window.innerWidth * 0.2;
                const y = window.innerHeight / 2;
                popup.style.left = x + 'px';
                popup.style.top = y + 'px';

                document.body.appendChild(popup);

                setTimeout(() => popup.remove(), 2000);
            }

            triggerConfetti() {
                for (let i = 0; i < 30; i++) {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.textContent = ['🎉', '⭐', '🌟', '✨'][Math.floor(Math.random() * 4)];
                    confetti.style.left = Math.random() * window.innerWidth + 'px';
                    confetti.style.top = '-10px';
                    confetti.style.fontSize = (10 + Math.random() * 10) + 'px';
                    document.body.appendChild(confetti);

                    setTimeout(() => confetti.remove(), 3000);
                }
            }

            handleNextQuestion() {
                this.displayNextQuestion();
            }

            finishSession() {
                clearInterval(this.timerInterval);

                this.engine.globalStats.totalSessions += 1;
                this.engine.globalStats.totalPoints += this.sessionStats.pointsEarned;

                if (this.sessionStats.currentStreak > this.engine.globalStats.bestStreak) {
                    this.engine.globalStats.bestStreak = this.sessionStats.currentStreak;
                }

                this.engine.globalStats.sessionHistory.push({
                    date: new Date().toISOString(),
                    duration: this.sessionDuration,
                    questionsAnswered: this.sessionStats.questionsAnswered,
                    correctAnswers: this.sessionStats.correctAnswers,
                    pointsEarned: this.sessionStats.pointsEarned,
                    streak: this.sessionStats.currentStreak
                });

                this.engine.saveGlobalStats();

                this.showCompleteScreen();
            }

            showCompleteScreen() {
                const accuracy = Math.round((this.sessionStats.correctAnswers / this.sessionStats.questionsAnswered) * 100) || 0;

                document.getElementById('completeQuestionsCount').textContent = this.sessionStats.questionsAnswered;
                document.getElementById('completeAccuracy').textContent = accuracy + '%';
                document.getElementById('completePoints').textContent = this.sessionStats.pointsEarned;
                document.getElementById('completeStreak').textContent = this.sessionStats.currentStreak;

                let encouragement = '';
                if (accuracy >= 90) {
                    encouragement = 'Absolutely brilliant! You\'re a true English master! Keep this momentum going.';
                } else if (accuracy >= 75) {
                    encouragement = 'Excellent work! You\'re making real progress. A few more sessions and you\'ll be unstoppable!';
                } else if (accuracy >= 60) {
                    encouragement = 'Great effort! Every mistake is a chance to learn. You\'re improving each session!';
                } else {
                    encouragement = 'Good try! Keep practising and you\'ll see improvement. Every expert was once a beginner!';
                }

                document.getElementById('encouragement').textContent = encouragement;

                this.showScreen('complete');
            }

            showScreen(screenName) {
                document.querySelectorAll('.screen').forEach(screen => {
                    screen.classList.remove('active');
                });

                const screen = document.getElementById(screenName + 'Screen');
                if (screen) {
                    screen.classList.add('active');
                }

                this.currentScreen = screenName;

                if (screenName === 'start') {
                    this.updateStartScreen();
                }
            }

            goToStart() {
                this.showScreen('start');
            }
        }

        // ===== INITIALIZATION =====
        const engine = new AdaptiveEngine();
        const ui = new UIController(engine);
    </script>
</body>
</html>
