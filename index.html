<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Walter's English Dojo</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0f0f1a;
    --card: #1a1a2e;
    --card-hover: #222240;
    --accent: #6c5ce7;
    --accent-light: #a29bfe;
    --green: #00b894;
    --green-glow: rgba(0,184,148,0.3);
    --red: #e17055;
    --red-glow: rgba(225,112,85,0.3);
    --orange: #fdcb6e;
    --blue: #74b9ff;
    --text: #f0f0f0;
    --text-dim: #8888aa;
    --border: #2d2d50;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* === ANIMATED BACKGROUND === */
  .bg-particles {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none; z-index: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(108,92,231,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 20%, rgba(116,185,255,0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 80%, rgba(0,184,148,0.05) 0%, transparent 50%);
  }

  .container {
    position: relative; z-index: 1;
    max-width: 900px; margin: 0 auto; padding: 20px;
  }

  /* === HEADER === */
  .header {
    text-align: center; padding: 30px 0 20px;
  }
  .header h1 {
    font-family: 'Fredoka', sans-serif;
    font-size: 2.4em;
    background: linear-gradient(135deg, var(--accent-light), var(--blue), var(--green));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header .subtitle {
    color: var(--text-dim); margin-top: 6px; font-size: 0.95em;
  }

  /* === STATS BAR === */
  .stats-bar {
    display: flex; gap: 12px; justify-content: center; margin: 20px 0 30px;
    flex-wrap: wrap;
  }
  .stat-pill {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 50px; padding: 8px 20px;
    display: flex; align-items: center; gap: 8px;
    font-size: 0.9em;
  }
  .stat-pill .icon { font-size: 1.1em; }
  .stat-pill .val { font-weight: 600; color: var(--accent-light); }

  /* === STREAK DISPLAY === */
  .streak-display {
    text-align: center; margin-bottom: 25px;
  }
  .streak-fire {
    font-size: 2em; display: inline-block;
    animation: pulse 1s infinite;
  }
  @keyframes pulse {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.15); }
  }
  .streak-text {
    font-family: 'Fredoka', sans-serif;
    font-size: 1.1em; color: var(--orange);
  }

  /* === NAV BUTTONS === */
  .nav-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 12px; margin-bottom: 30px;
  }
  .nav-btn {
    background: var(--card); border: 2px solid var(--border);
    border-radius: 16px; padding: 18px 14px;
    cursor: pointer; transition: all 0.25s;
    text-align: center; position: relative; overflow: hidden;
  }
  .nav-btn:hover { background: var(--card-hover); border-color: var(--accent); transform: translateY(-2px); }
  .nav-btn.active { border-color: var(--accent); background: rgba(108,92,231,0.15); }
  .nav-btn .nav-icon { font-size: 1.8em; margin-bottom: 6px; display: block; }
  .nav-btn .nav-label {
    font-family: 'Fredoka', sans-serif;
    font-size: 0.95em; font-weight: 500;
  }
  .nav-btn .nav-score {
    font-size: 0.75em; color: var(--text-dim); margin-top: 4px;
  }
  .nav-btn .priority-badge {
    position: absolute; top: 8px; right: 8px;
    background: var(--red); color: white;
    font-size: 0.6em; font-weight: 700;
    padding: 2px 7px; border-radius: 20px;
    text-transform: uppercase; letter-spacing: 0.5px;
  }

  /* === GAME AREA === */
  .game-area {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 20px; padding: 30px;
    min-height: 350px;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .game-title {
    font-family: 'Fredoka', sans-serif;
    font-size: 1.4em; margin-bottom: 6px;
    color: var(--accent-light);
  }
  .game-desc {
    color: var(--text-dim); font-size: 0.88em; margin-bottom: 24px;
  }

  /* === PROGRESS BAR === */
  .progress-container { margin-bottom: 20px; }
  .progress-label {
    display: flex; justify-content: space-between;
    font-size: 0.8em; color: var(--text-dim); margin-bottom: 6px;
  }
  .progress-bar {
    height: 8px; background: rgba(255,255,255,0.08);
    border-radius: 10px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; border-radius: 10px;
    background: linear-gradient(90deg, var(--accent), var(--green));
    transition: width 0.5s ease;
  }

  /* === QUESTION STYLES === */
  .question-text {
    font-size: 1.15em; line-height: 1.6; margin-bottom: 20px;
    font-weight: 500;
  }
  .question-text .highlight {
    color: var(--orange); font-weight: 600;
    text-decoration: underline; text-decoration-style: wavy;
    text-underline-offset: 4px;
  }

  /* Passage style for comprehension */
  .passage-box {
    background: rgba(255,255,255,0.04);
    border-left: 3px solid var(--accent);
    padding: 16px 20px; margin-bottom: 20px;
    border-radius: 0 12px 12px 0;
    font-size: 0.95em; line-height: 1.7;
    color: #ddd;
  }

  /* Spelling sentence with sections */
  .spelling-sentence {
    font-size: 1.1em; line-height: 2; margin-bottom: 20px;
    text-align: center;
  }
  .spelling-section {
    display: inline; cursor: pointer;
    padding: 4px 2px; border-radius: 4px;
    transition: all 0.2s;
    border-bottom: 2px solid transparent;
  }
  .spelling-section:hover {
    background: rgba(108,92,231,0.15);
    border-bottom-color: var(--accent);
  }

  /* === OPTION BUTTONS === */
  .options-grid {
    display: grid; gap: 10px;
  }
  .option-btn {
    background: rgba(255,255,255,0.04);
    border: 2px solid var(--border);
    border-radius: 14px; padding: 14px 18px;
    cursor: pointer; transition: all 0.2s;
    text-align: left; font-size: 1em;
    color: var(--text); display: flex; align-items: center; gap: 12px;
  }
  .option-btn:hover:not(.disabled) {
    border-color: var(--accent); background: rgba(108,92,231,0.1);
    transform: translateX(4px);
  }
  .option-btn .option-key {
    width: 32px; height: 32px; flex-shrink: 0;
    border-radius: 8px; background: rgba(255,255,255,0.06);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 0.85em; color: var(--accent-light);
  }
  .option-btn.correct {
    border-color: var(--green); background: rgba(0,184,148,0.12);
    box-shadow: 0 0 20px var(--green-glow);
  }
  .option-btn.correct .option-key { background: var(--green); color: white; }
  .option-btn.wrong {
    border-color: var(--red); background: rgba(225,112,85,0.1);
    box-shadow: 0 0 20px var(--red-glow);
  }
  .option-btn.wrong .option-key { background: var(--red); color: white; }
  .option-btn.disabled { cursor: default; opacity: 0.7; }

  /* === FEEDBACK === */
  .feedback-box {
    margin-top: 20px; padding: 16px 20px;
    border-radius: 14px; font-size: 0.92em; line-height: 1.6;
    animation: fadeIn 0.3s ease;
  }
  .feedback-box.correct {
    background: rgba(0,184,148,0.1); border: 1px solid rgba(0,184,148,0.3);
  }
  .feedback-box.wrong {
    background: rgba(225,112,85,0.1); border: 1px solid rgba(225,112,85,0.3);
  }
  .feedback-box .fb-title {
    font-family: 'Fredoka', sans-serif;
    font-weight: 600; margin-bottom: 6px; font-size: 1.05em;
  }
  .feedback-box.correct .fb-title { color: var(--green); }
  .feedback-box.wrong .fb-title { color: var(--red); }

  .next-btn {
    display: inline-block; margin-top: 18px;
    background: linear-gradient(135deg, var(--accent), #5a4bd1);
    color: white; border: none; border-radius: 12px;
    padding: 12px 28px; font-size: 1em; font-weight: 600;
    cursor: pointer; transition: all 0.2s;
    font-family: 'Fredoka', sans-serif;
  }
  .next-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(108,92,231,0.4); }

  /* === DASHBOARD === */
  .dash-section { margin-bottom: 24px; }
  .dash-section h3 {
    font-family: 'Fredoka', sans-serif;
    font-size: 1.1em; margin-bottom: 12px; color: var(--accent-light);
  }
  .weak-area {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 18px; margin-bottom: 8px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .weak-area .area-name { font-weight: 500; }
  .weak-area .area-bar { width: 120px; height: 6px; background: rgba(255,255,255,0.08); border-radius: 10px; overflow: hidden; }
  .weak-area .area-fill { height: 100%; border-radius: 10px; }

  .tip-card {
    background: rgba(108,92,231,0.08);
    border: 1px solid rgba(108,92,231,0.2);
    border-radius: 14px; padding: 16px; margin-top: 12px;
    font-size: 0.9em; line-height: 1.6;
  }
  .tip-card .tip-header { font-weight: 600; color: var(--orange); margin-bottom: 4px; }

  /* === ANIMATIONS === */
  .points-popup {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Fredoka', sans-serif;
    font-size: 3em; font-weight: 700;
    pointer-events: none; z-index: 100;
    animation: popUp 1s ease forwards;
  }
  .points-popup.green { color: var(--green); }
  .points-popup.red { color: var(--red); }
  @keyframes popUp {
    0% { opacity: 1; transform: translate(-50%, -50%) scale(0.5); }
    50% { opacity: 1; transform: translate(-50%, -70%) scale(1.2); }
    100% { opacity: 0; transform: translate(-50%, -100%) scale(1); }
  }

  .confetti {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none; z-index: 99;
  }
  .confetti-piece {
    position: absolute; width: 10px; height: 10px; border-radius: 2px;
    animation: confettiFall 2s ease forwards;
  }
  @keyframes confettiFall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  /* === RESPONSIVE === */
  @media (max-width: 600px) {
    .container { padding: 12px; }
    .header h1 { font-size: 1.8em; }
    .nav-grid { grid-template-columns: repeat(2, 1fr); }
    .game-area { padding: 20px 16px; }
    .stats-bar { gap: 8px; }
    .stat-pill { padding: 6px 14px; font-size: 0.8em; }
  }
</style>
</head>
<body>

<div class="bg-particles"></div>
<div class="container" id="app"></div>

<script>
// ============================================
// ALEXANDER'S ENGLISH DOJO - QUESTION BANKS
// ============================================
// All questions designed around his specific weak areas from the GL1Eng exam

const VOCAB_QUESTIONS = [
  // --- Words he got WRONG in the exam ---
  {
    word: "fixedly",
    sentence: "Scrooge looked <b>fixedly</b> at the strange face on the door knocker.",
    options: ["Briefly", "Continuously", "Disgustedly", "Astonishedly"],
    correct: 1,
    explain: "'Fixedly' means to stare continuously without looking away — like your eyes are FIXED on something. Think of 'fixed' = locked in place. Scrooge couldn't stop staring!"
  },
  {
    word: "resounded",
    sentence: "The sound <b>resounded</b> through the house like thunder.",
    options: ["Loud, repeating sound", "Mumbling sound", "Low pitch sound", "Sudden sound"],
    correct: 0,
    explain: "'Resounded' means a sound that echoes and repeats loudly. Think 're-' (again) + 'sound' — the sound keeps bouncing around the house!"
  },
  {
    word: "obliged",
    sentence: "Scrooge felt <b>obliged</b> to keep his promise to the old man.",
    options: ["Reluctant", "Positioned", "Compelled", "Burdened"],
    correct: 2,
    explain: "'Obliged' means forced or compelled to do something, like you have no choice. If someone does you a favour, you feel obliged (compelled) to repay them."
  },
  {
    word: "melancholy",
    sentence: "Scrooge ate his <b>melancholy</b> dinner alone at the dark tavern.",
    options: ["Spirited", "Lovely", "Tasty", "Joyless"],
    correct: 3,
    explain: "'Melancholy' means deeply sad and joyless. A melancholy dinner would be gloomy and depressing — no fun at all!"
  },
  // --- Common 11+ vocabulary ---
  {
    word: "perilous",
    sentence: "The <b>perilous</b> mountain path was covered in ice.",
    options: ["Safe", "Dangerous", "Beautiful", "Narrow"],
    correct: 1,
    explain: "'Perilous' means extremely dangerous. Think of 'peril' = danger. A perilous path could get you hurt!"
  },
  {
    word: "benevolent",
    sentence: "The <b>benevolent</b> old woman gave food to everyone who was hungry.",
    options: ["Wealthy", "Kind and generous", "Strict", "Lonely"],
    correct: 1,
    explain: "'Benevolent' means kind and generous — wanting to help others. 'Bene' = good (like 'benefit'). A benevolent person does good for others."
  },
  {
    word: "reluctant",
    sentence: "Tom was <b>reluctant</b> to jump into the freezing cold lake.",
    options: ["Eager", "Excited", "Unwilling", "Unable"],
    correct: 2,
    explain: "'Reluctant' means unwilling or hesitant — you really don't want to do it but you might have to. Like when you're reluctant to get out of bed on Monday!"
  },
  {
    word: "desolate",
    sentence: "The <b>desolate</b> landscape stretched for miles without a single tree.",
    options: ["Crowded", "Colourful", "Empty and bleak", "Flat"],
    correct: 2,
    explain: "'Desolate' means completely empty, bare, and sad-looking. A desolate place feels lonely and abandoned."
  },
  {
    word: "ominous",
    sentence: "Dark clouds gathered in an <b>ominous</b> way above the old castle.",
    options: ["Exciting", "Threatening", "Beautiful", "Unusual"],
    correct: 1,
    explain: "'Ominous' means something that gives you a bad feeling about what's coming — like a warning of danger. Think: 'Oh no!' = ominous."
  },
  {
    word: "impeccable",
    sentence: "Her <b>impeccable</b> manners impressed everyone at the dinner.",
    options: ["Flawless", "Unusual", "Casual", "Rude"],
    correct: 0,
    explain: "'Impeccable' means absolutely perfect with no flaws. Think: 'im-' (not) + 'peccable' (having faults) = without fault!"
  },
  {
    word: "arduous",
    sentence: "The climb up the mountain was <b>arduous</b> and exhausting.",
    options: ["Quick", "Extremely difficult", "Enjoyable", "Short"],
    correct: 1,
    explain: "'Arduous' means requiring a lot of hard effort and energy. An arduous task makes you sweat!"
  },
  {
    word: "cryptic",
    sentence: "The stranger left a <b>cryptic</b> message that nobody could understand.",
    options: ["Friendly", "Mysterious and puzzling", "Long", "Angry"],
    correct: 1,
    explain: "'Cryptic' means mysterious and hard to understand — like it's written in secret code. Think 'crypt' = hidden."
  },
  {
    word: "perturbed",
    sentence: "Scrooge was clearly <b>perturbed</b> after seeing the ghostly face.",
    options: ["Amused", "Hungry", "Worried and unsettled", "Angry"],
    correct: 2,
    explain: "'Perturbed' means worried, anxious and unsettled. When something perturbs you, it disturbs your peace of mind."
  },
  {
    word: "beguiled",
    sentence: "She <b>beguiled</b> the evening away by reading a good book.",
    options: ["Wasted", "Passed pleasantly", "Ruined", "Slept through"],
    correct: 1,
    explain: "'Beguiled' can mean to charm or to pass time in a pleasant way. Scrooge 'beguiled' his evening reading — he passed it pleasantly."
  },
  {
    word: "fain",
    sentence: "It was so dark that Scrooge was <b>fain</b> to grope with his hands.",
    options: ["Forced", "Happy", "Unable", "Afraid"],
    correct: 0,
    explain: "'Fain' is an old-fashioned word meaning forced or obliged to do something. He HAD to feel his way in the dark because he couldn't see."
  },
  {
    word: "relinquished",
    sentence: "He put his hand on the key he had <b>relinquished</b>.",
    options: ["Broken", "Given up or let go", "Polished", "Found"],
    correct: 1,
    explain: "'Relinquished' means to let go of or give up something. He had let go of the key, then went back to grab it again."
  },
  {
    word: "irresolution",
    sentence: "He paused with a moment's <b>irresolution</b> before shutting the door.",
    options: ["Anger", "Courage", "Uncertainty", "Strength"],
    correct: 2,
    explain: "'Irresolution' means being unable to decide — hesitating. 'Ir-' (not) + 'resolution' (firm decision) = not being decided!"
  },
  {
    word: "ferocious",
    sentence: "The lion looked <b>ferocious</b> as it bared its teeth.",
    options: ["Tired", "Fierce and aggressive", "Confused", "Small"],
    correct: 1,
    explain: "'Ferocious' means extremely fierce, violent, or aggressive. A ferocious animal would terrify you!"
  },
  {
    word: "livid",
    sentence: "Its <b>livid</b> colour made the face look horrible.",
    options: ["Bright red", "Pale and deathly", "Dark blue", "Golden"],
    correct: 1,
    explain: "'Livid' can mean a pale, greyish colour (like a bruise or dead skin). In Dickens, the livid face looked ghostly and deathly pale."
  },
  {
    word: "bestowed",
    sentence: "She <b>bestowed</b> a generous gift upon the orphanage.",
    options: ["Took", "Gave", "Borrowed", "Lost"],
    correct: 1,
    explain: "'Bestowed' means to give something as a gift or honour. When you bestow something, you present it generously."
  }
];

const SPELLING_QUESTIONS = [
  // Based on words from his exam + similar 11+ level
  {
    sentence: "The malicious actions of the perpetrator | shattered the innocense | of the small town.",
    sections: ["The malicious actions of the perpetrator", "shattered the innocense", "of the small town."],
    labels: ["A", "B", "C"],
    correct: 1, // B — "innocense" should be "innocence"
    misspelled: "innocense",
    correction: "innocence",
    explain: "The correct spelling is 'innocence' — remember, it ends in '-ence' not '-ense'."
  },
  {
    sentence: "Although the report was partial, | the information included was crutial | for making decisions.",
    sections: ["Although the report was partial,", "the information included was crutial", "for making decisions."],
    labels: ["A", "B", "C"],
    correct: 1,
    misspelled: "crutial",
    correction: "crucial",
    explain: "The correct spelling is 'crucial' — think 'cruc-ial', not 'crut-ial'. The root is 'crux' meaning a critical point."
  },
  {
    sentence: "Sarah tried awkwardly | to conceel her uncontrollable | laughter during the serious meeting.",
    sections: ["Sarah tried awkwardly", "to conceel her uncontrollable", "laughter during the serious meeting."],
    labels: ["A", "B", "C"],
    correct: 1,
    misspelled: "conceel",
    correction: "conceal",
    explain: "The correct spelling is 'conceal' — 'ea' not 'ee'. Think of 'seal' — you conceal something by sealing it away."
  },
  {
    sentence: "The company's strict new dress code | aimed to curb flambouyant | attire in the workplace.",
    sections: ["The company's strict new dress code", "aimed to curb flambouyant", "attire in the workplace."],
    labels: ["A", "B", "C"],
    correct: 1,
    misspelled: "flambouyant",
    correction: "flamboyant",
    explain: "The correct spelling is 'flamboyant' — remember 'boy' is in the middle: flam-BOY-ant."
  },
  {
    sentence: "The restarant was fully booked | during February as couples | celebrated Valentine's Day.",
    sections: ["The restarant was fully booked", "during February as couples", "celebrated Valentine's Day."],
    labels: ["A", "B", "C"],
    correct: 0,
    misspelled: "restarant",
    correction: "restaurant",
    explain: "The correct spelling is 'restaurant' — remember: rest-AU-rant. There's a 'u' hiding in there!"
  },
  {
    sentence: "It is more hygenic | to cough and sneeze | into your elbow during flu season.",
    sections: ["It is more hygenic", "to cough and sneeze", "into your elbow during flu season."],
    labels: ["A", "B", "C"],
    correct: 0,
    misspelled: "hygenic",
    correction: "hygienic",
    explain: "The correct spelling is 'hygienic' — it has an 'i' before the 'e': hyg-I-enic. Think 'hygiene' + 'ic'."
  },
  {
    sentence: "She was warry of the steep | descent, unsure of how much | she could endure.",
    sections: ["She was warry of the steep", "descent, unsure of how much", "she could endure."],
    labels: ["A", "B", "C"],
    correct: 0,
    misspelled: "warry",
    correction: "wary",
    explain: "The correct spelling is 'wary' — just one 'r'. Be WARY of adding extra letters!"
  },
  {
    sentence: "The official inaugural ceremony | marked the begining of a new era | for the organisation.",
    sections: ["The official inaugural ceremony", "marked the begining of a new era", "for the organisation."],
    labels: ["A", "B", "C"],
    correct: 1,
    misspelled: "begining",
    correction: "beginning",
    explain: "The correct spelling is 'beginning' — double 'n' in the middle. Remember: begiNNing has a double N!"
  },
  {
    sentence: "Residents of the borough | percieved the rough roads | as a persistent issue.",
    sections: ["Residents of the borough", "percieved the rough roads", "as a persistent issue."],
    labels: ["A", "B", "C"],
    correct: 1,
    misspelled: "percieved",
    correction: "perceived",
    explain: "The correct spelling is 'perceived' — remember the rule: 'i before e, except after c'. Per-C-EIVED!"
  },
  {
    sentence: "Her hesitation was infectious, | spreading through the group | as they deliberated there next move.",
    sections: ["Her hesitation was infectious,", "spreading through the group", "as they deliberated there next move."],
    labels: ["A", "B", "C"],
    correct: 2,
    misspelled: "there",
    correction: "their",
    explain: "'Their' (belonging to them) not 'there' (a place). Their next move = the move belonging to them."
  },
  {
    sentence: "As the winds swept across the island, | they brought with them seeds | of the thissle plant.",
    sections: ["As the winds swept across the island,", "they brought with them seeds", "of the thissle plant."],
    labels: ["A", "B", "C"],
    correct: 2,

// ============================================
// APP STATE & LOGIC
// ============================================

let state = {
  screen: 'dashboard', // dashboard, vocab, spelling, punctuation, comprehension
  points: 0,
  streak: 0,
  bestStreak: 0,
  totalAnswered: 0,
  totalCorrect: 0,
  // Per-category tracking
  vocabAnswered: 0, vocabCorrect: 0,
  spellingAnswered: 0, spellingCorrect: 0,
  punctAnswered: 0, punctCorrect: 0,
  compAnswered: 0, compCorrect: 0,
  // Current question state
  currentQ: 0,
  answered: false,
  selectedAnswer: null,
  showFeedback: false,
  // Shuffled question indices
  vocabOrder: [], spellingOrder: [], punctOrder: [], compOrder: [],
  // Popups
  popup: null,
  confetti: false,
};

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function initOrders() {
  state.vocabOrder = shuffle(Array.from({length: VOCAB_QUESTIONS.length}, (_, i) => i));
  state.spellingOrder = shuffle(Array.from({length: SPELLING_QUESTIONS.length}, (_, i) => i));
  state.punctOrder = shuffle(Array.from({length: PUNCTUATION_QUESTIONS.length}, (_, i) => i));
  state.compOrder = shuffle(Array.from({length: COMPREHENSION_QUESTIONS.length}, (_, i) => i));
}
initOrders();

function getQuestionBank() {
  switch(state.screen) {
    case 'vocab': return { bank: VOCAB_QUESTIONS, order: state.vocabOrder };
    case 'spelling': return { bank: SPELLING_QUESTIONS, order: state.spellingOrder };
    case 'punctuation': return { bank: PUNCTUATION_QUESTIONS, order: state.punctOrder };
    case 'comprehension': return { bank: COMPREHENSION_QUESTIONS, order: state.compOrder };
    default: return null;
  }
}

function getCurrentQuestion() {
  const qb = getQuestionBank();
  if (!qb) return null;
  const idx = qb.order[state.currentQ % qb.order.length];
  return qb.bank[idx];
}

function selectAnswer(ansIdx) {
  if (state.answered) return;
  state.answered = true;
  state.selectedAnswer = ansIdx;
  state.showFeedback = true;
  state.totalAnswered++;

  const q = getCurrentQuestion();
  const isCorrect = ansIdx === q.correct;

  // Category tracking
  if (state.screen === 'vocab') { state.vocabAnswered++; if (isCorrect) state.vocabCorrect++; }
  if (state.screen === 'spelling') { state.spellingAnswered++; if (isCorrect) state.spellingCorrect++; }
  if (state.screen === 'punctuation') { state.punctAnswered++; if (isCorrect) state.punctCorrect++; }
  if (state.screen === 'comprehension') { state.compAnswered++; if (isCorrect) state.compCorrect++; }

  if (isCorrect) {
    state.totalCorrect++;
    state.streak++;
    if (state.streak > state.bestStreak) state.bestStreak = state.streak;
    const bonus = state.streak >= 3 ? 15 : 10;
    state.points += bonus;
    state.popup = { text: `+${bonus}`, type: 'green' };
    if (state.streak >= 5 && state.streak % 5 === 0) state.confetti = true;
  } else {
    state.streak = 0;
    state.popup = { text: 'Keep going!', type: 'red' };
  }

  render();
  setTimeout(() => { state.popup = null; state.confetti = false; render(); }, 1200);
}

function selectSpellingAnswer(ansIdx) {
  // For spelling: ansIdx is section index (0,1,2) or -1 for "no error"
  if (state.answered) return;
  const q = getCurrentQuestion();
  state.answered = true;
  state.selectedAnswer = ansIdx;
  state.showFeedback = true;
  state.totalAnswered++;
  state.spellingAnswered++;

  const isCorrect = ansIdx === q.correct;
  if (isCorrect) {
    state.spellingCorrect++;
    state.totalCorrect++;
    state.streak++;
    if (state.streak > state.bestStreak) state.bestStreak = state.streak;
    const bonus = state.streak >= 3 ? 15 : 10;
    state.points += bonus;
    state.popup = { text: `+${bonus}`, type: 'green' };
    if (state.streak >= 5 && state.streak % 5 === 0) state.confetti = true;
  } else {
    state.streak = 0;
    state.popup = { text: 'Keep going!', type: 'red' };
  }

  render();
  setTimeout(() => { state.popup = null; state.confetti = false; render(); }, 1200);
}

function nextQuestion() {
  state.currentQ++;
  state.answered = false;
  state.selectedAnswer = null;
  state.showFeedback = false;
  render();
  // Scroll to top of game area
  document.querySelector('.game-area')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function goTo(screen) {
  state.screen = screen;
  state.currentQ = 0;
  state.answered = false;
  state.selectedAnswer = null;
  state.showFeedback = false;
  // Re-shuffle
  if (screen === 'vocab') state.vocabOrder = shuffle(state.vocabOrder);
  if (screen === 'spelling') state.spellingOrder = shuffle(state.spellingOrder);
  if (screen === 'punctuation') state.punctOrder = shuffle(state.punctOrder);
  if (screen === 'comprehension') state.compOrder = shuffle(state.compOrder);
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function pct(correct, total) {
  if (total === 0) return '--';
  return Math.round((correct / total) * 100) + '%';
}

function renderHeader() {
  return `
    <div class="header">
      <h1>Walter's English Dojo</h1>
      <div class="subtitle">Level up your 11+ English skills</div>
    </div>
  `;
}

function renderStats() {
  return `
    <div class="stats-bar">
      <div class="stat-pill"><span class="icon">&#9733;</span> <span class="val">${state.points}</span> points</div>
      <div class="stat-pill"><span class="icon">&#10003;</span> <span class="val">${state.totalAnswered > 0 ? pct(state.totalCorrect, state.totalAnswered) : '--'}</span> accuracy</div>
      <div class="stat-pill"><span class="icon">&#9889;</span> <span class="val">${state.bestStreak}</span> best streak</div>

    ${state.streak >= 2 ? `

}

  return `

        <div class="tip-card" style="margin-top:10px;">
          <div class="tip-header">2. Look for word roots</div>
          When you see a word you don't know (like "irresolution"), try breaking it apart: "ir" (not) + "resolution" (a firm decision) = not being decided = uncertainty. This trick works for loads of 11+ words!
        </div>
        <div class="tip-card" style="margin-top:10px;">
          <div class="tip-header">3. Ask "why" not just "what"</div>
          In comprehension, you're great at spotting WHAT happened. Now practise asking WHY the character did it and WHY the author wrote it that way. That's where the trickier marks are.
        </div>
      </div>

      <div style="text-align:center; margin-top:24px;">
        <button class="next-btn" onclick="goTo('vocab')" style="margin-right:10px;">&#128218; Start Vocab Dojo</button>
        <button class="next-btn" onclick="goTo('spelling')">&#128269; Start Spelling Spotter</button>
      </div>
    </div>
  `;
}

function renderVocab() {
  const q = getCurrentQuestion();
  const qb = getQuestionBank();
  const total = qb.bank.length;
  const num = (state.currentQ % total) + 1;

  return `
    <div class="game-area">
      <div class="game-title">&#128218; Vocab Dojo</div>
      <div class="game-desc">What does this word mean? Use the sentence to help you figure it out.</div>

      <div class="progress-container">
        <div class="progress-label"><span>Question ${num} of ${total}</span><span>${pct(state.vocabCorrect, state.vocabAnswered)} accuracy</span></div>
        <div class="progress-bar"><div class="progress-fill" style="width:${(num/total)*100}%"></div></div>
      </div>

      <div class="question-text">What does the word <span class="highlight">${q.word}</span> mean?</div>
      <div class="passage-box">${q.sentence}</div>

      <div class="options-grid">
        ${q.options.map((opt, i) => {
          let cls = 'option-btn';
          if (state.answered) {
            cls += ' disabled';
            if (i === q.correct) cls += ' correct';
            else if (i === state.selectedAnswer && i !== q.correct) cls += ' wrong';
          }
          return `<div class="${cls}" onclick="selectAnswer(${i})">
            <span class="option-key">${String.fromCharCode(65+i)}</span>
            <span>${opt}</span>
          </div>`;
        }).join('')}
      </div>

      ${state.showFeedback ? renderFeedback(q) : ''}
    </div>
  `;
}

function renderSpelling() {
  const q = getCurrentQuestion();
  const qb = getQuestionBank();
  const total = qb.bank.length;
  const num = (state.currentQ % total) + 1;

  let sectionHTML = q.sections.map((sec, i) => {
    let cls = 'spelling-section';
    if (state.answered) {
      if (i === q.correct) cls += ' correct';
      else if (i === state.selectedAnswer && i !== q.correct) cls += ' wrong';
    }
    const style = state.answered && i === q.correct ? 'background:rgba(0,184,148,0.2);border-radius:4px;padding:2px 4px;' :
                  state.answered && i === state.selectedAnswer && i !== q.correct ? 'background:rgba(225,112,85,0.2);border-radius:4px;padding:2px 4px;' : '';
    return `<span style="${style}" onclick="selectSpellingAnswer(${i})">${sec}</span>`;
  }).join(' | ');

  return `
    <div class="game-area">
      <div class="game-title">&#128269; Spelling Spotter</div>
      <div class="game-desc">Find the group of words containing the spelling mistake. Click the section, or choose "No mistake" if everything is correct.</div>

      <div class="progress-container">
        <div class="progress-label"><span>Question ${num} of ${total}</span><span>${pct(state.spellingCorrect, state.spellingAnswered)} accuracy</span></div>
        <div class="progress-bar"><div class="progress-fill" style="width:${(num/total)*100}%"></div></div>
      </div>

      <div class="question-text">Which section contains a spelling mistake?</div>

      <div style="text-align:center; margin-bottom:20px;">
        <div class="spelling-sentence">${sectionHTML}</div>
      </div>

      <div class="options-grid">
        ${q.labels.map((label, i) => {
          let cls = 'option-btn';
          if (state.answered) {
            cls += ' disabled';
            if (i === q.correct) cls += ' correct';
            else if (i === state.selectedAnswer && i !== q.correct) cls += ' wrong';
          }
          return `<div class="${cls}" onclick="selectSpellingAnswer(${i})">
            <span class="option-key">${label}</span>
            <span>${q.sections[i]}</span>
          </div>`;
        }).join('')}
        <div class="option-btn ${state.answered ? 'disabled' : ''} ${state.answered && q.correct === -1 ? 'correct' : ''} ${state.answered && state.selectedAnswer === -1 && q.correct !== -1 ? 'wrong' : ''}" onclick="selectSpellingAnswer(-1)">
          <span class="option-key">N</span>
          <span>No mistake</span>
        </div>
      </div>

      ${state.showFeedback ? renderSpellingFeedback(q) : ''}
    </div>
  `;
}

function renderSpellingFeedback(q) {
  const isCorrect = state.selectedAnswer === q.correct;
  return `
    <div class="feedback-box ${isCorrect ? 'correct' : 'wrong'}">
      <div class="fb-title">${isCorrect ? '&#10004; Brilliant!' : '&#10008; Not quite!'}</div>
      <p>${q.explain}</p>
      ${q.misspelled ? `<p style="margin-top:8px;"><strong>${q.misspelled}</strong> &#8594; <strong style="color:var(--green);">${q.correction}</strong></p>` : ''}
    </div>
    <button class="next-btn" onclick="nextQuestion()">Next Question &#8594;</button>
  `;
}

function renderPunctuation() {
  const q = getCurrentQuestion();
  const qb = getQuestionBank();
  const total = qb.bank.length;
  const num = (state.currentQ % total) + 1;

  return `
    <div class="game-area">
      <div class="game-title">&#9998; Punctuation Pro</div>
      <div class="game-desc">This sentence has a punctuation issue. Pick the correctly punctuated version.</div>

      <div class="progress-container">
        <div class="progress-label"><span>Question ${num} of ${total}</span><span>${pct(state.punctCorrect, state.punctAnswered)} accuracy</span></div>
        <div class="progress-bar"><div class="progress-fill" style="width:${(num/total)*100}%"></div></div>
      </div>

      <div class="question-text">Fix the punctuation:</div>
      <div class="passage-box" style="font-size:1.05em;">${q.sentence}</div>

      <div class="options-grid">
        ${q.options.map((opt, i) => {
          let cls = 'option-btn';
          if (state.answered) {
            cls += ' disabled';
            if (i === q.correct) cls += ' correct';
            else if (i === state.selectedAnswer && i !== q.correct) cls += ' wrong';
          }
          return `<div class="${cls}" onclick="selectAnswer(${i})">
            <span class="option-key">${String.fromCharCode(65+i)}</span>
            <span>${opt}</span>
          </div>`;
        }).join('')}
      </div>

      ${state.showFeedback ? renderFeedback(q) : ''}
    </div>
  `;
}

function renderComprehension() {
  const q = getCurrentQuestion();
  const qb = getQuestionBank();
  const total = qb.bank.length;
  const num = (state.currentQ % total) + 1;

  return `
    <div class="game-area">
      <div class="game-title">&#128373; Reading Detective</div>
      <div class="game-desc">Read the passage carefully. Think about WHY the author wrote it this way.</div>

      <div class="progress-container">
        <div class="progress-label"><span>Question ${num} of ${total}</span><span>${pct(state.compCorrect, state.compAnswered)} accuracy</span></div>
        <div class="progress-bar"><div class="progress-fill" style="width:${(num/total)*100}%"></div></div>
      </div>

      <div class="passage-box">${q.passage}</div>
      <div class="question-text">${q.question}</div>

      <div class="options-grid">
        ${q.options.map((opt, i) => {
          let cls = 'option-btn';
          if (state.answered) {
            cls += ' disabled';
            if (i === q.correct) cls += ' correct';
            else if (i === state.selectedAnswer && i !== q.correct) cls += ' wrong';
          }
          return `<div class="${cls}" onclick="selectAnswer(${i})">
            <span class="option-key">${String.fromCharCode(65+i)}</span>
            <span>${opt}</span>
          </div>`;
        }).join('')}
      </div>

      ${state.showFeedback ? renderFeedback(q) : ''}
    </div>
  `;
}

function renderFeedback(q) {
  const isCorrect = state.selectedAnswer === q.correct;
  return `
    <div class="feedback-box ${isCorrect ? 'correct' : 'wrong'}">
      <div class="fb-title">${isCorrect ? '&#10004; Brilliant!' : '&#10008; Not quite!'}</div>
      <p>${q.explain}</p>
    </div>
    <button class="next-btn" onclick="nextQuestion()">Next Question &#8594;</button>
  `;
}

function renderPopups() {
  let html = '';
  if (state.popup) {
    html += `<div class="points-popup ${state.popup.type}">${state.popup.text}</div>`;
  }
  if (state.confetti) {
    const colors = ['#6c5ce7','#00b894','#fdcb6e','#e17055','#74b9ff','#a29bfe'];
    html += '<div class="confetti">';
    for (let i = 0; i < 30; i++) {
      const left = Math.random() * 100;
      const delay = Math.random() * 0.5;
      const color = colors[Math.floor(Math.random() * colors.length)];
      const size = 6 + Math.random() * 8;
      html += `<div class="confetti-piece" style="left:${left}%;top:-10px;width:${size}px;height:${size}px;background:${color};animation-delay:${delay}s;"></div>`;
    }
    html += '</div>';
  }
  return html;
}

function render() {
  let html = renderHeader() + renderStats() + renderNav();

  switch(state.screen) {
    case 'dashboard': html += renderDashboard(); break;
    case 'vocab': html += renderVocab(); break;
    case 'spelling': html += renderSpelling(); break;
    case 'punctuation': html += renderPunctuation(); break;
    case 'comprehension': html += renderComprehension(); break;
  }

  html += renderPopups();
  document.getElementById('app').innerHTML = html;
}

// Initial render
render();
</script>
</body>
</html>
